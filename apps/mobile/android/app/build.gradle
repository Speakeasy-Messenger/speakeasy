apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"
// FCM — must come AFTER the application plugin so it can attach itself
// to the variant graph. Reads `google-services.json` from this module
// (apps/mobile/android/app/) at evaluation time.
apply plugin: "com.google.gms.google-services"

// =====================================================================
// Version derivation — single source of truth is the git tag.
//
// Resolution order:
//   1. $GITHUB_REF (CI, on tag push) — set to refs/tags/alpha-0.5.0-rc.81
//   2. `git describe --tags --dirty --always` — local dev with tags
//   3. literal "0.0.0-dev" fallback (CI without tag / shallow checkout)
//
// Tag formats:
//   - Alpha RC:  `alpha-<semver>-rc.<N>` e.g. `alpha-0.7.0-rc.84`
//       versionName → "0.7.0-rc.84"; versionCode → N (84)
//   - Production: `v<semver>` e.g. `v1.0.0`
//       versionName → "1.0.0"; versionCode → M*10000+m*100+p (10000),
//       which sits above the alpha rc range and rises monotonically.
// For builds off-tag (dirty/SHA) gradle uses a positive placeholder;
// release CI only builds on a real tag, so it never reaches the Store.
// See computedVersionName / computedVersionCode below.
//
// This replaces the previous "manually bump versionName + versionCode +
// JS APP_VERSION + JS APP_BUILD before each release" choreography. The
// JS side now reads BuildConfig via VersionModule (see app/src/main/
// java/.../version/VersionModule.kt).
// =====================================================================
def deriveVersionString = { ->
    def env = System.getenv("GITHUB_REF") ?: ""
    if (env.startsWith("refs/tags/")) {
        return env.substring("refs/tags/".length())
    }
    try {
        // Don't specify cwd — gradle invokes the build from the
        // project's android/ dir which is inside the git repo, so
        // `git describe` resolves correctly without a cwd hint.
        // The previous attempt used `project.rootDir` and then
        // `rootProject.projectDir`, both of which can be null when
        // evaluated through the RN gradle plugin's variant config
        // phase (observed as "Cannot get property 'rootDir' on null
        // object" in rc.82 and rc.83 release builds).
        def proc = ["git", "describe", "--tags", "--dirty", "--always"]
                .execute()
        proc.waitFor()
        if (proc.exitValue() == 0) {
            def desc = proc.text.trim()
            if (desc) return desc
        }
    } catch (Exception ignored) {
        // git not available or not a repo — fall through
    }
    return "alpha-0.0.0-dev"
}

def rawVersionTag = deriveVersionString()

def computedVersionName = {
    // Production / GA tags are `v<semver>` (e.g. "v1.0.0") → "1.0.0".
    // Alpha tags are `alpha-<semver-with-rc>` (e.g. "alpha-0.7.0-rc.84")
    // → "0.7.0-rc.84". A dirty/off-tag describe (e.g.
    // "alpha-0.7.0-rc.84-3-gabcd123-dirty") keeps the extra detail so the
    // About screen tells the truth about dev builds.
    if (rawVersionTag.startsWith("alpha-")) {
        return rawVersionTag.substring("alpha-".length())
    }
    if (rawVersionTag ==~ /^v\d.*/) {
        // Strip the leading `v` and any `-hotfix.N` suffix so a re-cut of
        // a shipped GA keeps the same user-facing version string:
        //   v1.0.1         → "1.0.1"
        //   v1.0.1-hotfix.1 → "1.0.1"  (16 KB / edge-to-edge re-cut)
        // The hotfix only moves versionCode (below), never versionName.
        return rawVersionTag.substring(1).replaceAll(/-hotfix\.\d+$/, "")
    }
    return rawVersionTag
}()

def computedVersionCode = {
    // Unified monotonic scheme: code = base*1000 + sub
    //   base = major*10000 + minor*100 + patch   (the semver in the name)
    //   sub  = rc number (1..998)   for an alpha rc
    //          999                  for a final/GA
    //          999+N (1000..)       for the Nth hotfix re-cut of a GA
    // Guarantees every rc sits below its own final, every final sits below
    // its own hotfixes, and every version's codes sit above all earlier
    // versions' — so the line stays a valid Play upgrade after 1.0.0:
    //   alpha-1.0.1-rc.1 → 10001001 ; v1.0.1 → 10001999 ;
    //   v1.0.1-hotfix.1 → 10002000 ; v1.1.0 → 11000999
    // The hotfix sub-range (1000..) stays below the next patch's rc range
    // (v1.0.2 would be base 10002 → 10002001..), so a hotfix of v1.0.1 is
    // distinct from anything a v1.0.2 line produces. (Historical note:
    // v1.0.0 shipped under an earlier simple scheme as code 10000; every
    // code this scheme produces is > 10000, so the line stays monotonic.)
    // MUST be a positive integer — AGP rejects 0 — so a SHA-only /
    // non-semver off-tag build falls back to 1 (never shipped).
    def sv = computedVersionName =~ /^(\d+)\.(\d+)\.(\d+)/
    if (!sv.find()) return 1
    def base = sv.group(1).toInteger() * 10000 + sv.group(2).toInteger() * 100 + sv.group(3).toInteger()
    def rc = rawVersionTag =~ /-rc\.(\d+)$/
    def hotfix = rawVersionTag =~ /-hotfix\.(\d+)$/
    def sub
    if (rc.find()) {
        sub = rc.group(1).toInteger()           // alpha rc: 1..998
    } else if (hotfix.find()) {
        sub = 999 + hotfix.group(1).toInteger() // GA hotfix re-cut: 1000..
    } else {
        sub = 999                               // final / GA
    }
    return base * 1000 + sub
}()

println "[version] tag=${rawVersionTag} name=${computedVersionName} code=${computedVersionCode}"

// Workspace packages (@speakeasy/shared, /crypto, /vouchflow) compile to
// `dist/` and are consumed by Metro through the workspace symlink. They
// live outside the Android project tree, so gradle's incremental build
// doesn't track their source files as inputs to the JS bundle task —
// editing a .ts in packages/shared and running `assembleRelease` would
// silently reuse the cached bundle. Three failed alpha builds traced to
// this exact failure mode (0.1.9, 0.1.10, 0.1.11).
//
// Fix: a gradle task that runs `npm run build` for those packages, and
// a hook that makes the JS bundle task depend on it. The task is always
// out-of-date so it runs every build — the underlying tsc is fast and
// incremental, so the cost is small.
def monorepoRoot = file("${rootDir}/../../..")
task buildSpeakeasyWorkspacePackages(type: Exec) {
    workingDir monorepoRoot
    commandLine 'npm', 'run', 'build', '--if-present',
        '-w', '@speakeasy/shared',
        '-w', '@speakeasy/crypto',
        '-w', '@speakeasy/vouchflow'
    outputs.upToDateWhen { false }
}
afterEvaluate {
    tasks.matching { it.name ==~ /(create|bundle)(Debug|Release|.*)JsAndAssets/ }
        .configureEach { it.dependsOn buildSpeakeasyWorkspacePackages }
}

/**
 * This is the configuration block to customize your React Native Android app.
 * By default you don't need to apply any configuration, just uncomment the lines you need.
 */
react {
    /* Folders — monorepo overrides. RN packages are hoisted to the workspace
     * root node_modules; from android/app/ that's ../../../../node_modules. */
    root = file("../../")
    reactNativeDir = file("../../../../node_modules/react-native")
    codegenDir = file("../../../../node_modules/@react-native/codegen")
    cliFile = file("../../../../node_modules/react-native/cli.js")

    /* Variants */
    //   The list of variants to that are debuggable. For those we're going to
    //   skip the bundling of the JS bundle and the assets. By default is just 'debug'.
    //   If you add flavors like lite, prod, etc. you'll have to list your debuggableVariants.
    // debuggableVariants = ["liteDebug", "prodDebug"]

    /* Bundling */
    //   A list containing the node command and its flags. Default is just 'node'.
    // nodeExecutableAndArgs = ["node"]
    //
    //   The command to run when bundling. By default is 'bundle'
    // bundleCommand = "ram-bundle"
    //
    //   The path to the CLI configuration file. Default is empty.
    // bundleConfig = file(../rn-cli.config.js)
    //
    //   The name of the generated asset file containing your JS bundle
    // bundleAssetName = "MyApplication.android.bundle"
    //
    //   The entry file for bundle generation. Default is 'index.android.js' or 'index.js'
    // entryFile = file("../js/MyApplication.android.js")
    //
    //   A list of extra flags to pass to the 'bundle' commands.
    //   See https://github.com/react-native-community/cli/blob/main/docs/commands.md#bundle
    // extraPackagerArgs = []

    /* Hermes Commands */
    //   The hermes compiler command to run. By default it is 'hermesc'.
    //   Monorepo override: RN's gradle plugin auto-detects hermesc using
    //   `${reactNativeDir}/sdks/hermesc/${osBin}/hermesc` BUT the auto-
    //   detection logic uses Gradle's `OperatingSystem.current()`, which
    //   on a few Linux distros mis-detects and leaves `%OS-BIN%`
    //   unsubstituted. Hardcode the linux64 path to avoid the failure.
    hermesCommand = file("${rootDir}/../../../node_modules/react-native/sdks/hermesc/linux64-bin/hermesc").absolutePath
    //
    //   The list of flags to pass to the Hermes compiler. By default is "-O", "-output-source-map"
    // hermesFlags = ["-O", "-output-source-map"]

    /* Autolinking */
    autolinkLibrariesWithApp()
}

/**
 * Run R8 (code shrinking + obfuscation) on release builds. Keep rules
 * live in `proguard-rules.pro`. Resource shrinking is deliberately left
 * off — string-addressed resources (e.g. the `ic_notification` icon
 * named from JS) are unsafe for the resource shrinker to reason about.
 *
 * The duplicate `org/webrtc/audio/*` classes (Speakeasy fork vs
 * upstream jar) used to fail R8 here; the artifact transform below
 * strips them from the upstream jar before D8/R8 see it, so R8 stays
 * enabled for release.
 */
def enableProguardInReleaseBuilds = true

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 *
 * For example, to use the international variant, you can use:
 * `def jscFlavor = 'org.webkit:android-jsc-intl:+'`
 *
 * The international variant includes ICU i18n library and necessary data
 * allowing to use e.g. `Date.toLocaleString` and `String.localeCompare` that
 * give correct results when using with locales other than en-US. Note that
 * this variant is about 6MiB larger per architecture than default.
 */
def jscFlavor = 'org.webkit:android-jsc:+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    // Phase 5b: libsignal-android requires core library desugaring for
    // java.time.* APIs (Instant, Duration). Bundles a backport so we don't
    // need to bump minSdk to 33+.
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    namespace "xyz.speakeasyapp.app"
    defaultConfig {
        applicationId "xyz.speakeasyapp.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        // alpha-0.5.0-rc.27 — second pass at the FAB freeze:
        //   - dropped autoFocus on the find-sheet input. On some
        //     Androids the keyboard reveal races the modal slide-up
        //     and lands a touch-intercepting layer on top of the
        //     sheet, presenting as a frozen page.
        //   - long-press on the conversations AppBar gear copies
        //     the diag log straight to the clipboard. Needed because
        //     a freeze that blocks navigation also blocks the path
        //     to Diagnostics → Copy logs; this is the escape hatch.
        // alpha-0.5.0-rc.26 —
        //   - splash holds for ≥1500ms (was disappearing in
        //     <200ms on warm cache)
        //   - FindSomeoneSheet wrapped with pointerEvents="box-none"
        //     wrap matching CallTypeSheet's pattern (suspect: rc.25
        //     "freeze after tapping +" was an Android sibling-
        //     absolute hit-test issue with the scrim)
        //   - FAB tap now logged to diag so the next dump captures
        //     whether the freeze fires before or after sheet open
        // alpha-0.5.0-rc.25 — fix turtle hooks-mismatch. The diag
        // boundary captured "Rendered more hooks than during the
        // previous render." for turtle. Root cause: babel's worklet
        // transform of `useAnimatedProps(closure-over-params)`
        // inside a custom hook called repeatedly (7×ShellShimmer +
        // 2×FlipperPaddle) generated an IIFE worklet factory that
        // ran each render. Reanimated's internal subscription
        // tracking saw the resulting "new worklet identity" and
        // varied its hook count between first paint and re-render.
        // Fix: each cell + flipper extracted into its own component
        // instance — every `useAnimatedProps` site is at a fixed
        // hook position. Same pattern applied to koi (4 fins) and
        // lynx (2 tufts) to head off identical issues.
        // alpha-0.5.0-rc.24 — turtle reanimated. lunchbox2 wears
        // turtle (legendary) — the rc.21 across-the-board revert
        // had silently kept turtle static through rc.22/23. Now
        // restored: 6 shell-cells shimmer in a slow opacity wave
        // and front/rear flippers paddle in counter-phase. Both
        // continuous + time-driven (no audio gate), so they're
        // visible the moment the avatar paints.
        // alpha-0.5.0-rc.23 — owl ringtone + raven continuous head
        // bob as a definitive worklet-runtime test. rc.22 left raven
        // looking static because its head tilt only fires on
        // amplitude > 0.5 (i.e. live audio); a non-call view of
        // raven looked indistinguishable from "reanimated never
        // ran". rc.23 swaps to a continuous ±6° bob — if raven nods
        // gently regardless of audio, the worklet runtime is alive
        // and the cache fix held. Ringback now uses
        // `ringback_owl.mp3` (raw resource).
        //
        // alpha-0.5.0-rc.22 — reanimated comeback (3 animals as
        // canaries: raven, lynx, koi). rc.17 actually had reanimated
        // working in source, but Metro had cached pre-rc.17 babel
        // transforms (without the reanimated plugin pass) so the
        // worklet hashes never made it into the production bundle.
        // Verified: clean-cache bundle has 397 __workletHash markers
        // vs the rc.20 production bundle's 2 (only reanimated's
        // internals). Cache-cleared rebuild captures the real
        // transforms. If raven animates correctly on this build,
        // rc.23 restores the other 13 paid avatars to reanimated.
        // alpha-0.5.0-rc.21 — restore avatar visibility + call fixes:
        //   - all 16 paid avatars reverted to static rc.13 art
        //     (reanimated worklet runtime was throwing in production
        //     even with the entry-point init from rc.20). Signature
        //     animations deferred until reanimated can be debugged
        //     on a real device.
        //   - hangup() wraps the WS send so a flapped socket can't
        //     crash the call screen (user reported crash on cancel)
        //   - eyebrow drops the redundant "RINGING" — the state
        //     caption already says it
        //   - FAB collapses back to default position when every
        //     get-started card is dismissed
        // alpha-0.5.0-rc.20 — fix rc.19 launch crash + call audio:
        //   - reanimated forced-init at index.js entry so the worklet
        //     runtime is ready before paid-avatar renders touch it
        //   - AvatarErrorBoundary around AnimalSvg so a bad render
        //     can't crash the whole screen (rc.19 reproducer was a
        //     paid-avatar wear path firing useSharedValue too early)
        //   - call audio: explicit earpiece default (was implicit
        //     speakerphone in some flows); InCallManager.start
        //     uses auto routing now
        //   - outgoing-call ringback (system default tone) plays
        //     while waiting for the peer to answer
        // rc.82+ — versionCode/versionName auto-derived from the git
        // tag at build time. See top-of-file `deriveVersionString` for
        // the resolution order. No more manual bumps; CI guard in
        // release.yml verifies the artifact carries the expected tag.
        versionCode computedVersionCode
        versionName computedVersionName
        // Phase 5b: BuildConfig fields for Vouchflow SDK init. Pulled from
        // android/gradle.properties (the api key is gitignored — see
        // android/gradle.properties.example for the placeholder).
        //
        // Guard: fail the build if the api key is still the placeholder.
        // The SDK throws InvalidApiKey during configure() at app start,
        // which kills the app with no way to diagnose without the inline
        // crash writer. Surface the same failure at build time instead.
        def vouchflowKey = project.findProperty('vouchflow.apiKey') ?: 'PLACEHOLDER_REPLACE_BEFORE_RUNNING'
        if (vouchflowKey == 'PLACEHOLDER_REPLACE_BEFORE_RUNNING' || vouchflowKey.startsWith('vsk_sandbox_write_PASTE')) {
            throw new GradleException(
                "vouchflow.apiKey is the placeholder. Pass a real key:\n" +
                "  ./gradlew :app:assembleRelease -Pvouchflow.apiKey=\$VOUCHFLOW_WRITE_KEY\n" +
                "Source apps/api/.env.local first to populate VOUCHFLOW_WRITE_KEY in your shell.")
        }
        // Guard the exact mismatch that broke v1.0.3 in production: a SANDBOX
        // write key (vsk_sandbox_…) compiled with environment=production. The
        // SDK then attests the device against the PRODUCTION Vouchflow endpoint
        // using a sandbox key, which is rejected — so every Play-Store signup
        // failed with `device_not_found`, and no server config could fix it
        // (the bad key ships inside the APK). Fail the build instead of
        // shipping that combination again.
        def vouchflowEnv = project.findProperty('vouchflow.environment') ?: 'sandbox'
        if (vouchflowEnv == 'production' && vouchflowKey.startsWith('vsk_sandbox')) {
            throw new GradleException(
                "vouchflow.environment=production but vouchflow.apiKey is a SANDBOX key " +
                "(vsk_sandbox_…). A sandbox key cannot attest against production Vouchflow — " +
                "every enrollment fails 'device_not_found' (this shipped in v1.0.3). Use the " +
                "production write key (vsk_live_…), or build with " +
                "-Pvouchflow.environment=sandbox to match the key.")
        }
        buildConfigField "String", "VOUCHFLOW_API_KEY", "\"${vouchflowKey}\""
        buildConfigField "String", "VOUCHFLOW_ENVIRONMENT",
            "\"${project.findProperty('vouchflow.environment') ?: 'sandbox'}\""
    }
    buildFeatures {
        buildConfig true
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Production signing key. Supplied at build time and never
            // committed: release CI decodes the ANDROID_KEYSTORE_BASE64
            // repo secret to a file and passes its path as
            // -PRELEASE_STORE_FILE, with the credentials as
            // ORG_GRADLE_PROJECT_RELEASE_* environment variables (see
            // .github/workflows/release.yml). Builds without the keystore
            // — local dev, PR builds, the Tier B emulator suite — fall
            // through to debug signing in `buildTypes.release` below.
            def ksPath = project.findProperty('RELEASE_STORE_FILE')
            if (ksPath != null && file(ksPath).exists()) {
                storeFile file(ksPath)
                storePassword project.findProperty('RELEASE_STORE_PASSWORD')
                keyAlias project.findProperty('RELEASE_KEY_ALIAS')
                keyPassword project.findProperty('RELEASE_KEY_PASSWORD')
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Sign with the production keystore when it was supplied
            // (release CI); otherwise fall back to debug signing so local
            // and PR builds still produce an installable APK. release.yml's
            // "assert release APK is not debug-signed" step fails the
            // pipeline if a published artifact ever slips through
            // debug-signed.
            signingConfig signingConfigs.release.storeFile != null
                    ? signingConfigs.release
                    : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

// Phase 5c: sqlcipher-android 4.14 transitively pulls kotlin-stdlib 2.1.x
// and bumps androidx.sqlite to 2.6.x — both compiled with a Kotlin 2.1
// metadata version the RN-template Kotlin compiler (1.9.x) can't read
// ("compiled with an incompatible version of Kotlin"). Pin both back to
// versions compatible with the project Kotlin toolchain.
configurations.all {
    resolutionStrategy.eachDependency { details ->
        if (details.requested.group == 'org.jetbrains.kotlin' &&
                details.requested.name.startsWith('kotlin-stdlib')) {
            details.useVersion(rootProject.ext.kotlinVersion)
        }
        if (details.requested.group == 'androidx.sqlite') {
            // 2.4.0 was published with Kotlin 1.8 metadata — readable by 1.9.
            details.useVersion('2.4.0')
        }
    }
}

// =====================================================================
// Phase 5j Private Call — strip duplicate `org/webrtc/audio/*` classes
// from the upstream WebRTC jar.
//
// The Speakeasy fork at `app/src/main/java/org/webrtc/audio/*.java`
// (landed in #58) defines the SAME FQCNs as the upstream
// `org.jitsi:webrtc:124.0.0` jar — necessary because the C++ side of
// libwebrtc calls into Java by class name (`org/webrtc/audio/
// WebRtcAudioRecord`), so our fork can't live in a different package.
//
// Debug builds shadow the upstream classes via Android multidex
// ordering (project sources go into earlier `classes<N>.dex` files;
// PathClassLoader returns the project version first). Release builds
// run `:app:mergeDexRelease`, which D8 refuses to do when the same
// FQCN appears in two dex inputs. The fix below produces a stripped
// copy of the upstream jar (with `org/webrtc/audio/*.class` removed),
// excludes the original from the runtime classpath, and adds the
// stripped one in its place — net effect: react-native-webrtc still
// sees every WebRTC class it needs (PeerConnection, RTCAudioDevice,
// etc.) via the stripped jar, while `org/webrtc/audio/*` resolves
// only to our project-source fork. No more duplicate-class D8/R8
// failure.
//
// See `app/src/main/java/org/webrtc/audio/README.md` for the fork
// rationale.
// =====================================================================

def strippedWebrtcJar = layout.buildDirectory.file('stripped-webrtc/webrtc-no-audio.jar').get().asFile
def strippedWebrtcJniDir = layout.buildDirectory.dir('stripped-webrtc/jni').get().asFile

// Detached configuration so we can resolve the upstream WebRTC AAR
// without circular dependencies on our own classpaths. We ask for
// the raw AAR and unpack `classes.jar` from it manually — going
// through AGP's AAR-to-jar transform creates an attribute mismatch
// the standalone artifact-transform approach couldn't punch through.
configurations {
    speakeasyWebrtcUpstream {
        canBeConsumed = false
        canBeResolved = true
        attributes {
            attribute(Attribute.of('artifactType', String), 'aar')
        }
    }
}

dependencies {
    speakeasyWebrtcUpstream("org.jitsi:webrtc:124.+")
}

task speakeasyStripUpstreamWebrtcAudio {
    description "Extract the upstream WebRTC AAR's classes (sans org/webrtc/audio fork-conflicts) and JNI .so libraries so the app can run without depending on org.jitsi:webrtc (which we exclude to dodge the duplicate-class D8 failure)."
    inputs.files(configurations.speakeasyWebrtcUpstream)
    outputs.file(strippedWebrtcJar)
    outputs.dir(strippedWebrtcJniDir)
    doLast {
        def aar = configurations.speakeasyWebrtcUpstream.files.find {
            it.name.startsWith('webrtc-') && it.name.endsWith('.aar')
        }
        if (aar == null) {
            throw new GradleException("Could not find upstream webrtc-*.aar in the speakeasyWebrtcUpstream configuration. Files: ${configurations.speakeasyWebrtcUpstream.files*.name}")
        }
        // The upstream AAR holds the real WebRTC classes (~925KB) at
        // `libs/libwebrtc.jar`, and the per-ABI native libraries
        // (libjingle_peerconnection_so.so, ~10MB each) under `jni/`.
        // We extract BOTH — the jar (sans our forked classes) goes
        // into the classpath, and the .so files go into a jniLibs
        // source dir AGP packages into the APK. The AAR's
        // `classes.jar` is an almost-empty Jitsi stub, ignore it.
        strippedWebrtcJar.parentFile.mkdirs()
        strippedWebrtcJniDir.mkdirs()
        new java.util.zip.ZipFile(aar).withCloseable { aarZip ->
            // ----- libs/libwebrtc.jar — strip the fork conflicts -----
            def libsEntry = aarZip.getEntry('libs/libwebrtc.jar')
            if (libsEntry == null) {
                throw new GradleException("Upstream webrtc AAR does not contain libs/libwebrtc.jar — AAR layout may have changed; investigate before re-running.")
            }
            def tempJar = new File(strippedWebrtcJar.parentFile, 'raw-libwebrtc.jar')
            tempJar.bytes = aarZip.getInputStream(libsEntry).bytes
            // Only strip the classes our project-source fork ACTUALLY
            // re-defines (8 top-level files + their inner classes). The
            // AudioDeviceModule interface, all the *Callback / *Code
            // enums declared at the top-level of upstream, and any
            // future upstream additions remain available — our fork
            // imports them. The prefix pattern catches inner classes
            // (e.g., `WebRtcAudioRecord$AudioRecordThread.class`).
            def speakeasyForkedClassPrefixes = [
                'org/webrtc/audio/JavaAudioDeviceModule',
                'org/webrtc/audio/LowLatencyAudioBufferManager',
                'org/webrtc/audio/VolumeLogger',
                'org/webrtc/audio/WebRtcAudioEffects',
                'org/webrtc/audio/WebRtcAudioManager',
                'org/webrtc/audio/WebRtcAudioRecord',
                'org/webrtc/audio/WebRtcAudioTrack',
                'org/webrtc/audio/WebRtcAudioUtils',
            ]
            new java.util.zip.ZipFile(tempJar).withCloseable { zip ->
                new java.util.zip.ZipOutputStream(new java.io.FileOutputStream(strippedWebrtcJar)).withCloseable { out ->
                    def entries = zip.entries()
                    while (entries.hasMoreElements()) {
                        def entry = entries.nextElement()
                        boolean forked = speakeasyForkedClassPrefixes.any { prefix ->
                            entry.name == "${prefix}.class" || entry.name.startsWith("${prefix}\$")
                        }
                        if (forked) continue
                        out.putNextEntry(new java.util.zip.ZipEntry(entry.name))
                        out << zip.getInputStream(entry).bytes
                        out.closeEntry()
                    }
                }
            }
            tempJar.delete()

            // ----- jni/<abi>/*.so — extract native libraries -----
            // Without this the app crashes at first WebRTCModule init
            // with: UnsatisfiedLinkError: dlopen failed: library
            // "libjingle_peerconnection_so.so" not found. The upstream
            // exclude removes the AAR's classpath entry AND its
            // jniLibs contribution; we re-add the latter here.
            def entries = aarZip.entries()
            while (entries.hasMoreElements()) {
                def entry = entries.nextElement()
                if (!entry.name.startsWith('jni/') || entry.isDirectory()) continue
                def target = new File(strippedWebrtcJniDir, entry.name.substring('jni/'.length()))
                target.parentFile.mkdirs()
                target.bytes = aarZip.getInputStream(entry).bytes
            }
        }
        logger.lifecycle("[Speakeasy] stripped WebRTC -> ${strippedWebrtcJar} (+ jniLibs in ${strippedWebrtcJniDir})")
    }
}

// Pull the extracted JNI .so libraries into the APK via jniLibs.
// The merge tasks read `jniLibs.srcDirs` at execution time, so we
// just need to make sure the strip task runs first.
android {
    sourceSets {
        main {
            jniLibs.srcDirs += strippedWebrtcJniDir
        }
    }
}

afterEvaluate {
    tasks.matching {
        it.name.startsWith('merge') && it.name.contains('JniLib')
    }.configureEach {
        dependsOn speakeasyStripUpstreamWebrtcAudio
    }
}

// The `builtBy` on the file-collection dependency below wires the
// strip task into every consumer task automatically.

// Strip the upstream jar from every configuration except our own
// detached `speakeasyWebrtcUpstream` (which needs the raw AAR to
// extract `classes.jar`). The exclusion must apply to every
// AGP-resolved compile / runtime / dex configuration so the dex
// merger never sees the duplicate `org/webrtc/audio/*` classes.
configurations.matching { it.name != 'speakeasyWebrtcUpstream' }.all { config ->
    config.exclude group: 'org.jitsi', module: 'webrtc'
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")
    // FileProvider for opening received attachments through content://
    // URIs instead of exposing app-private file paths.
    implementation("androidx.core:core:1.13.1")

    // RN's bundled <Image> renders only the first frame of GIFs by
    // default — Fresco's animated-gif backend has to be added
    // explicitly. Pin the version to match the Fresco bundled with
    // RN 0.77 (3.4.0 — see node_modules/react-native/gradle/libs.versions.toml).
    // 3.4.0 also ships a 16 KB-page-aligned libgifimage.so (3.2.0/3.3.0
    // were 0x1000) — required for Play `completed` validation; it was the
    // last 4 KB-aligned lib in the v1.0.1 AAB. Without animated-gif at all,
    // GIF attachments render as a single frozen frame.
    implementation("com.facebook.fresco:animated-gif:3.4.0")

    // Phase 5b: Vouchflow Android SDK — wraps Android Keystore + biometrics
    // + Play Integrity attestation for device-native verification.
    // Maven coordinate: dev.vouchflow. Auto-published per push, so newer
    // patches arrive often; pinning explicitly for reproducible builds.
    // 2.0.0 adds deviceAgeDays, networkVerifications, firstSeen, and
    // VerificationContext to VouchflowResult; BiometricCancelled and
    // BiometricFailed are now data classes with sessionId; EnrollmentFailed
    // is a data class with enrollmentCause; new AccountStoreAccessDenied
    // error; and FallbackReason enum with requestFallback/submitFallbackOtp
    // for OTP-based verification fallback.
    // 2.1.1 fixes a first-launch crash — configure() no longer lets an
    // AccountManager SecurityException escape Application.onCreate()
    // (vouchflow/android-sdk#1); it falls back to Keystore-only storage.
    implementation("dev.vouchflow:android-sdk:2.1.1")

    // libsignal note (v1.0.1 16 KB re-cut): bumped 0.59.0 → 0.69.1.
    // 0.69.1 is the FIRST libsignal-android release whose prebuilt
    // libsignal_jni.so is 16 KB-page-aligned (LOAD p_align 0x4000) on
    // both arm64-v8a and x86_64 — verified by readelf against every
    // release from 0.59.0..0.73.3 (0.69.0 and earlier are 0x1000).
    // This is the smallest jump from our shipped 0.59.0, minimizing
    // API churn. Core protocol/state serialization (SessionRecord,
    // PreKeyRecord, identity keys) is protobuf and backward-compatible,
    // so v1.0.0 users' stored sessions deserialize unchanged — this is
    // a device-verification item (see release notes / plan risk #1).

    // Phase 5b: Signal Protocol — official AGPLv3 library from Open Whisper
    // Systems. Rust-backed implementation of Double Ratchet + X3DH on top of
    // platform crypto. Speakeasy is open source (AGPL-compatible) so the
    // license is fine. The spec's earlier "Conscrypt + BouncyCastle" wording
    // referred to the underlying primitives; libsignal uses platform crypto
    // under the hood, which is the spec's actual intent.
    implementation("org.signal:libsignal-android:0.69.1")
    // Required for libsignal-android (java.time backport on minSdk 28).
    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.0.4")

    // Phase 5c: SQLCipher for Android — full DB encryption for SQLite.
    // Successor artifact `sqlcipher-android` (the older
    // `android-database-sqlcipher` is in maintenance only). Native lib loaded
    // via System.loadLibrary("sqlcipher") inside SpeakeasyDb.
    implementation("net.zetetic:sqlcipher-android:4.14.1")
    // androidx.sqlite supplies the SupportSQLite* interfaces sqlcipher-android
    // implements. Already pulled transitively, declared explicitly so the
    // dependency contract is visible.
    implementation("androidx.sqlite:sqlite:2.4.0")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Phase 5j Private Call — stripped upstream WebRTC jar. The exclude
    // on `org.jitsi:webrtc` above removes the original; this adds the
    // version without `org/webrtc/audio/*` so D8/R8 don't see the
    // duplicate FQCNs that our project-source fork also defines. The
    // `builtBy` carries the task dependency so compileJava / dex /
    // minify all wait for the strip to finish before reading the jar.
    implementation files(strippedWebrtcJar) { builtBy speakeasyStripUpstreamWebrtcAudio }

    // Phase 5j Private Call (PR-B1): JUnit for the on-device voice-filter
    // DSP unit tests. Kotlin-only, runs on the JVM (no instrumented test).
    // Pinned to 4.13.2 because the only consumer is the DSP test suite —
    // upgrading to JUnit 5 would mean also wiring an Android Studio
    // plugin and adding the platform launcher; not worth it for one
    // module.
    testImplementation("junit:junit:4.13.2")
}
