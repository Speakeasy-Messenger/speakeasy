buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        // Phase 5b: dev.vouchflow:android-sdk requires API 28+ (Android 9.0).
        // Bumped from RN-template default 24 — see Vouchflow Android README.
        minSdkVersion = 28
        compileSdkVersion = 35
        targetSdkVersion = 34
        ndkVersion = "26.1.10909125"
        kotlinVersion = "1.9.24"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // FCM (push notifications). Reads google-services.json at compile
        // time and bakes the project_id / api_key into BuildConfig so
        // @react-native-firebase/messaging can wire to FCM at runtime.
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"
