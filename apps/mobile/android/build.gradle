buildscript {
    ext {
        buildToolsVersion = "35.0.0"
        // Phase 5b: dev.vouchflow:android-sdk requires API 28+ (Android 9.0).
        // Bumped from RN-template default 24 — see Vouchflow Android README.
        minSdkVersion = 28
        compileSdkVersion = 35
        // Play Store requires API 35 minimum since Aug 2025 (per the
        // Play Console error shown on rc.26 upload). compileSdk is
        // already 35 so this is just lifting the runtime target.
        targetSdkVersion = 35
        // NDK r27 is the first NDK that emits 16 KB-page-aligned (p_align
        // 0x4000) prebuilt .so files — required for Play `completed`
        // production validation since Aug 2025. Matches React Native
        // 0.77's pinned NDK. Bumped from r26 (26.1.10909125) for the
        // v1.0.1 16 KB re-cut. RN 0.77 also moves the Kotlin toolchain to
        // 2.0.21.
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.0.21"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
        // FCM (push notifications). Reads google-services.json at compile
        // time and bakes the project_id / api_key into BuildConfig so
        // @react-native-firebase/messaging can wire to FCM at runtime.
        classpath("com.google.gms:google-services:4.4.2")
    }
}

apply plugin: "com.facebook.react.rootproject"
