appId: xyz.speakeasyapp.app
name: Self-DM round trip
tags:
  - tier-b

---

# Run enrollment first
- runFlow: 01-enroll.yaml

- tapOn:
    text: "+ New chat"

# Enter our own ID (will be in placeholder)
- extendedWaitUntil:
    id: new-chat-input
    timeout: 5000

- tapOn:
    id: new-chat-input

- inputText: "me"

- tapOn:
    text: "Start"

# Wait for chat screen
- extendedWaitUntil:
    id: chat-input
    timeout: 10000

- tapOn:
    id: chat-input

- inputText: "Hello self"

- tapOn:
    id: chat-send

# Wait for echo
- extendedWaitUntil:
    id: chat-input
    timeout: 15000

- assertVisible:
    id: chat-input

# Go back to conversations list
- back

- extendedWaitUntil:
    id: conversations-userid
    timeout: 5000

# Verify conversation appears in list
- assertVisible:
    id: conversations-conversation-0
