appId: xyz.speakeasyapp.app
name: Self-DM round-trip (Tier B)
---

- clearState
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester02

# NEW-CONVERSATION.md §3: FAB opens the Find Someone sheet
# directly. The handle input is auto-focused, so we just type. Once
# the lookup resolves, the result card appears with testID
# `find-sheet-result` — tapping it opens the chat (no separate
# "Start chat" button anymore).
#
# Type our own handle directly for the self-DM. We enrolled it just
# above, so it is known — no need to copyTextFrom the header. (The
# header's `conversations-userid` is a View wrapping the Handle, and
# its rendered text is `@tester02` — the `@` is rejected by the
# find-sheet's handle validator anyway.)
- tapOn:
    id: "conversations-fab"
- tapOn:
    id: "find-sheet-input"
- inputText: "tester02"
- tapOn:
    id: "find-sheet-result"

# Send a message. Send button is an accent arrow icon (testID
# `chat-send`) that only renders once the input has content — brand
# §6.5. Type input first, then tap by id (the button has no visible
# text label any more).
- tapOn:
    id: "chat-input"
- inputText: "Hello self!"
- tapOn:
    id: "chat-send"

- assertVisible:
    text: "Hello self!"

- back

- assertVisible:
    text: "Hello self!"
