appId: com.speakeasy.app
---
# Self-DM round-trip test
- launchApp

# Navigate to new chat
- assertVisible:
    text: "+ New chat"
- tapOn:
    text: "+ New chat"

# Wait for new chat screen
- assertVisible:
    id: "new-chat-input"
- assertVisible:
    text: "Start"

# Enter own ID - need to first get our own ID
# For now, tap start with empty input (should show error or self-DM)
- tapOn:
    text: "Start"

# If we're on chat screen, send a message
- assertVisible:
    id: "chat-input"
- tapOn:
    id: "chat-input"
- inputText: "Hello self!"
- tapOn:
    text: "Send"

# Verify message appears
- assertVisible:
    text: "Hello self!"

# Go back to conversations
- back

# Verify conversation appears in list
- assertVisible:
    id: "conversations-screen"
