# Tier B flow #2 — self-DM round-trip.
#
# Self-contained: enrolls a fresh user, copies the userId, pastes it
# into NewChat, sends, asserts the bubble + that the conversation row
# survives a back-out. Avoids cross-flow state-passing (which was
# brittle — `${MAESTRO_USERID}` was treated as a literal string by
# Maestro instead of resolved from the prior flow's output map).

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-userid"
    timeout: 15000
- copyTextFrom:
    id: "id-reveal-userid"
- tapOn:
    id: "id-reveal-get-started"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 5000
- tapOn:
    id: "conversations-new-chat"
- assertVisible:
    id: "new-chat-peer-id-input"
- tapOn:
    id: "new-chat-peer-id-input"
# `pasteText` (no args) pastes the most recent `copyTextFrom` value
# from the device clipboard. Cleaner than env-var substitution, which
# Maestro doesn't auto-bind from copyTextFrom.
- pasteText
- tapOn:
    id: "new-chat-start"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000
- tapOn:
    id: "chat-input"
- inputText: "yo from maestro"
- tapOn:
    id: "chat-send"
- extendedWaitUntil:
    visible: "yo from maestro"
    timeout: 10000
# Tap the in-app "‹ Back" button — Maestro's `back` action triggers
# Android system back which react-native-screens doesn't reliably
# consume on the modal-presented Chat route. The artifact screenshot
# from run 25202433373 confirmed system back was a no-op.
- takeScreenshot: 01-chat-before-back
- tapOn:
    id: "chat-back"
- waitForAnimationToEnd
- takeScreenshot: 02-after-back
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 8000
- extendedWaitUntil:
    visible: "yo from maestro"
    timeout: 5000
