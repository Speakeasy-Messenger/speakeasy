# Tier B flow #2 — self-DM round-trip.

appId: xyz.speakeasyapp.app
---
- assertVisible:
    id: "conversations-userid"
- tapOn:
    id: "conversations-new-chat"
- assertVisible:
    id: "new-chat-peer-id-input"
- tapOn:
    id: "new-chat-peer-id-input"
- inputText: ${MAESTRO_USERID}
- tapOn:
    id: "new-chat-start"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000
- tapOn:
    id: "chat-input"
- inputText: "yo from maestro"
- tapOn:
    id: "chat-send"
- extendedWaitUntil:
    visible: "yo from maestro"
    timeout: 10000
- back
- assertVisible:
    id: "conversations-userid"
- extendedWaitUntil:
    visible: "yo from maestro"
    timeout: 5000
