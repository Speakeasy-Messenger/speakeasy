# Maestro flow: Self-DM round-trip (Tier B)
# Tests sending a message to yourself and verifying conversation persistence

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss ANR dialog if present
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Wait"

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-screen"
    timeout: 10000
- tapOn:
    text: "Get started"

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Copy user's own ID from header
- copyTextFrom:
    id: "conversations-userid"

# Navigate to new chat
- tapOn:
    text: "+ New chat"

# Paste own ID into the input (self-DM)
- tapOn:
    placeholder: "silent-golden-hawk"
- inputText: "${COPY_TEXT}"
- tapOn:
    text: "Start"

# Verify chat screen appears
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000

# Send a message
- tapOn:
    placeholder: "Say it…"
- inputText: "Hello self"
- tapOn:
    text: "Send"

# Wait for message to appear
- extendedWaitUntil:
    visible:
      text: "Hello self"
    timeout: 5000

# Navigate back to conversations list
- back

# Verify the conversation row exists
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 5000
- assertVisible:
    text: "Hello self"
