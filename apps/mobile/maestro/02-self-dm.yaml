appId: xyz.speakeasyapp.app
name: Self-DM round-trip (Tier B)
---

# 1. Setup — clear state & launch
- clearState
- launchApp

# 2. Dismiss ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# 3. Wait for onboarding screen
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 20000

# 4. Tap Continue to begin enrollment
- tapOn:
    text: "Continue"

# 4a. Handle BiometricPrompt PIN fallback (CI emulator, no fingerprint)
- runFlow: _unlock-biometric-prompt.yaml

# 5. Wait for enrollment to complete (race condition — see 01-enroll.yaml)
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 30000

# 6. Copy our user ID
- copyTextFrom:
    id: "conversations-userid"

# 7. Start new chat
- tapOn:
    text: "+ New chat"

# 8. Enter our own ID as recipient
- tapOn:
    id: "new-chat-input"
- inputText: "${COPY_TEXT}"

# 9. Start chat
- tapOn:
    text: "Start chat"

# 10. Send a message
- tapOn:
    id: "chat-input"
- inputText: "Hello self!"
- tapOn:
    text: "Send"

# 11. Verify message appears in chat
- assertVisible:
    text: "Hello self!"

# 12. Go back to conversations list
- back

# 13. Verify conversation appears in list
- assertVisible:
    text: "Hello self!"
