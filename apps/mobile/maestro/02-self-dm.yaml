appId: xyz.speakeasyapp.app
name: Self-DM round-trip (Tier B)
---

- clearState
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester02

# Copy our user ID — the conversations tab shows @<handle> in the
# header. We'll use it as the peer for a self-DM.
- copyTextFrom:
    id: "conversations-userid"

# New chat — FAB on the bottom-right of the Conversations screen
# (Phase 6 UX rebuild replaced the inline button with this FAB).
- tapOn:
    id: "conversations-new-chat"

# Enter our own ID as recipient
- tapOn:
    id: "new-chat-peer-id-input"
- inputText: "${maestro.copiedText}"

- tapOn:
    text: "Start chat"

# Send a message
- tapOn:
    id: "chat-input"
- inputText: "Hello self!"
- tapOn:
    text: "Send"

- assertVisible:
    text: "Hello self!"

- back

- assertVisible:
    text: "Hello self!"
