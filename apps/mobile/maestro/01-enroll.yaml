appId: xyz.speakeasyapp.app
name: Enroll fresh user (Tier B)
---

# 1. Clear state & launch
- clearState
- launchApp

# 2. Dismiss ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# 3. Wait for onboarding screen
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 20000

# 4. Tap Continue to begin enrollment
- tapOn:
    text: "Continue"

# 4a. Diagnostic: snapshot the screen ~5s after Continue. If a
#     BiometricPrompt is showing, the screenshot will be black/empty
#     (secure window) but the post-failure uiautomator dump will reveal
#     the dialog. If the screen still shows the onboarding view, the
#     SDK is hanging silently and we're chasing a different bug.
- takeScreenshot: post-continue-5s
- waitForAnimationToEnd
# 5. Wait for enrollment to complete
#    NOTE: Race condition — after setUserId(), the navigator flips
#    to the Auth stack (initialRoute: Conversations). The
#    navigation.replace('IdReveal') in OnboardingScreen may lose
#    the race, so we skip IdReveal and wait directly for Conversations.
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 30000
