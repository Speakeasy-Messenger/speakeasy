appId: xyz.speakeasyapp.app
name: Enroll fresh user (Tier B)

---

# Clear state for fresh start
- clearState
- clearKeychain

# Launch app
- launchApp

# Dismiss any ANR dialogs that may appear
- tapOn:
    text: "Wait"
    optional: true

# Wait for and tap Continue on onboarding
- waitForVisible:
    text: "Continue"
    timeout: 15000
- tapOn:
    text: "Continue"

# Wait for enrollment to complete (Vouchflow + key generation + API call)
# Then IdRevealScreen appears showing the user ID
- waitForVisible:
    id: id-reveal-userid
    timeout: 30000

# Tap Get started to proceed to conversations
- tapOn:
    text: "Get started"

# Wait for conversations screen to appear
- waitForVisible:
    id: conversations-userid
    timeout: 10000
