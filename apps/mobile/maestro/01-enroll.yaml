appId: xyz.speakeasyapp.app
name: Enroll fresh user
tags:
  - tier-b

---

# Launch the app
- launchApp

# Dismiss any ANR dialogs from the emulator
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"

# Tap "Continue" on the onboarding screen
- assertVisible: "Continue"
- tapOn: "Continue"

# Wait for enrollment to complete — the app should show IdReveal
# On CI emulators, vouchflow.verify() will fail and the app falls
# back to CiVouchflowClient. Allow up to 60 seconds for this.
- extendedWaitUntil:
    visible: "Get started"
    timeout: 60000

# Dismiss IdReveal
- tapOn:
    id: "id-reveal-get-started"

# Now the conversations screen should be visible
- assertVisible:
    id: "conversations-userid"
