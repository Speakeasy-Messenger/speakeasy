# Tier B flow #1 — enrollment.
#
# Verifies: app launches, onboarding renders, "Continue" mints a userId
# via the mock Vouchflow + InMemory user repo, IdRevealScreen shows it.
# We capture the userId via copyTextFrom + a runScript that writes it
# to maestro's output map; later flows pick it up via ${MAESTRO_USERID}.

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
- assertVisible: "Continue"
- tapOn:
    id: "onboarding-continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-userid"
    timeout: 15000
- copyTextFrom:
    id: "id-reveal-userid"
- runScript: capture-userid.js
- tapOn:
    id: "id-reveal-get-started"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 5000
