appId: xyz.speakeasyapp.app
name: Enroll fresh user
tags:
  - tier-b

---

- launchApp:
    clearState: true
    clearKeychain: true

# Dismiss ANR dialog if present
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn:
          text: "Wait"

- extendedWaitUntil:
    id: onboarding-continue
    timeout: 30000

- tapOn:
    text: "Continue"

# Wait for enrollment to complete — IdReveal shows "Get started"
- extendedWaitUntil:
    id: id-reveal-get-started
    timeout: 45000

- tapOn:
    text: "Get started"

# Should now be on conversations screen
- extendedWaitUntil:
    id: conversations-userid
    timeout: 10000
