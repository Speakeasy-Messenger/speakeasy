appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    stopApp: true

# Dismiss any ANR dialogs
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn:
          text: "Wait"

# Wait for onboarding screen
- assertVisible:
    id: "onboarding-id-input"
- assertVisible:
    text: "Continue"

# Tap the continue button (enrollment happens automatically)
- tapOn:
    text: "Continue"

# Wait for ID reveal animation (can take a moment)
- waitForAnimationToEnd:
    timeout: 5000

# Wait for conversations screen
- assertVisible:
    id: "conversations-screen"
- assertVisible:
    text: "Conversations"
