appId: xyz.speakeasyapp.app
name: Enroll fresh user (Tier B)
---

# 1. Clear state & launch
- clearState
- launchApp

# 2. Dismiss ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# 3. Run the shared enrollment flow — types a handle, waits for the
#    server's availability check to settle, taps Continue, dismisses
#    BiometricPrompt, asserts conversations-userid.
- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester01
