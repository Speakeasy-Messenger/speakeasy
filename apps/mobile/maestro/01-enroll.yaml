appId: xyz.speakeasyapp.app
name: Enroll fresh user (Tier B)

# 1. Clear state & launch
- clearState
- launchApp

# 2. Dismiss ANR "Wait" dialog if present (emulator startup artifact)
- tapOn:
    text: "Wait"
    optional: true

# 3. Wait for onboarding to appear
- waitForVisible:
    id: "onboarding-continue"
    timeout: 30000

# 4. Tap Continue to start enrollment (biometric + identity generation)
- tapOn:
    text: "Continue"

# 5. Wait for enrollment to complete
# The app has a known race condition: enrollment flips to the Auth stack
# (Conversations) BEFORE IdReveal can be shown. The test must accept either:
# - IdRevealScreen appears -> tap "Get started" -> Conversations
# - Conversations appears directly (race won by auth stack switch)

- waitForVisible:
    id: "conversations-userid"
    timeout: 60000
