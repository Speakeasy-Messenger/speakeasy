# Tier B flow #1 — enrollment.
#
# Verifies: app launches, onboarding renders, "Continue" mints a userId
# via the mock Vouchflow + InMemory user repo, IdRevealScreen shows it.

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
# GHA emulator is slow + unaccelerated. The app's launch work
# (AsyncStorage hydrate, Vouchflow native init, font load) routinely
# takes longer than Android's 5s ANR threshold and the system shows
# a "System UI isn't responding" overlay. extendedWaitUntil keeps
# polling — once the JS thread frees up, the overlay dismisses
# automatically and the Continue button becomes tappable.
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-userid"
    timeout: 15000
- tapOn:
    id: "id-reveal-get-started"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 5000
