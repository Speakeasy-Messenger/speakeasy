appId: xyz.speakeasyapp.app
name: Enroll fresh user
tags:
  - tier-b

---

- launchApp:
    clearState: true
    clearKeychain: true

# Dismiss ANR dialog if present
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"

- extendedWaitUntil:
    id: onboarding-continue
    timeout: 30000

- tapOn:
    id: onboarding-continue

# Wait for enrollment to complete (may take up to 30s on emulator with fallback)
# First check if IdReveal screen appears
- extendedWaitUntil:
    text: "Get started"
    timeout: 45000

- tapOn:
    id: id-reveal-get-started

# Should now be on conversations screen
- extendedWaitUntil:
    id: conversations-userid
    timeout: 10000
