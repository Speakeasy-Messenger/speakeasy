# Enroll fresh user
appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
# On Android 34 emulator we sometimes get an ANR dialog on first launch
- tapOn:
    text: "Wait"
    optional: true
# Wait for onboarding screen to be ready (the Continue button)
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    text: "Continue"
# Wait for IdReveal screen to appear
- extendedWaitUntil:
    visible:
      id: "id-reveal-userid"
    timeout: 60000
- extendedWaitUntil:
    visible:
      id: "id-reveal-get-started"
    timeout: 10000
- tapOn:
    text: "Get started"
# Wait for Conversations screen to appear
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 60000
