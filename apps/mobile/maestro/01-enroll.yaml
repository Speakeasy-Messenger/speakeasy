# Tier B flow #1 — enrollment.
#
# Verifies: app launches, onboarding renders, "Continue" mints a userId
# via the mock Vouchflow + InMemory user repo, IdRevealScreen shows it,
# then Conversations appears.

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
# GHA emulator is slow + unaccelerated; Pixel Launcher / SystemUI
# routinely ANR on cold boot, putting up a "Wait | Close app" dialog
# that blocks Maestro's view-hierarchy walker even though our app is
# fine underneath. Tap "Wait" if visible to dismiss the dialog.
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-continue"
# Wait for either enrollment success (IdReveal) or error message
- extendedWaitUntil:
    anyOf:
      - id: "id-reveal-get-started"
      - id: "onboarding-error"
    timeout: 30000
# If enrollment failed, take a screenshot and fail
- runFlow:
    when:
      visible:
        id: "onboarding-error"
    commands:
      - takeScreenshot: enrollment-error
      - assertTrue:
          label: "Enrollment should succeed, but got error"
          condition: false
# IdReveal screen shows the new userId — tap "Get started" to proceed.
- tapOn:
    id: "id-reveal-get-started"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 30000
