# Enroll fresh user (Tier B)
appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
# Dismiss any ANR "Wait" dialog from previous run
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
# Wait for and tap the Continue button on onboarding
- extendedWaitUntil:
    id: onboarding-continue
    timeout: 30000
- tapOn:
    id: onboarding-continue
# Wait for enrollment to complete and IdReveal to appear
- extendedWaitUntil:
    id: id-reveal-get-started
    timeout: 60000
# Tap "Get started" to proceed to conversations
- tapOn:
    id: id-reveal-get-started
# Wait for conversations screen to appear
- extendedWaitUntil:
    id: conversations-userid
    timeout: 10000
