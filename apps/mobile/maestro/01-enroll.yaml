# Maestro flow: enroll fresh user (Tier B)
appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
# Dismiss ANR dialogs (common on fresh emulator)
- repeat:
    times: 3
    commands:
      - tapOn:
          text: "Wait"
          optional: true
# Wait for onboarding screen
- assertVisible:
    id: "onboarding-id-input"
- tapOn:
    text: "Continue"
# Wait for ID reveal animation
- extendedWaitUntil:
    visible:
      id: "id-reveal-get-started"
    timeout: 20000
- tapOn:
    text: "Get started"
# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 60000
