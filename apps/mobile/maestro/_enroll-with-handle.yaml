# Shared sub-flow: complete enrollment via the Phase 3 4-screen
# onboarding flow.
#
# Steps:
#   01 Door     — tap "Open the door"
#   02 Room     — tap "Step inside"
#   03 Handle   — type handle → wait for "available" → tap "This one's mine"
#                 → BiometricPrompt subflow (PIN 0000 on the emulator)
#   04 Face     — tap the first animal tile → tap "Open the door"
#
# Each Tier B run boots a fresh in-memory api server, so any well-formed
# handle is available. Callers don't need to thread a unique value
# through — the in-runner namespace is empty at flow start.
#
# Pre-conditions:
#   - App is launched and Door step is on top.
#   - clearState / clearKeychain has run (we leave that to the parent
#     flow so it can run before launchApp).
#
# Post-conditions:
#   - Vouchflow attestation finished.
#   - Selected animal persisted via api.setAvatar.
#   - Conversations tab is visible and conversations-userid renders the
#     resolved user id (= the handle the caller picked).
#
# Args (set via env or `runFlow`'s env block):
#   HANDLE — handle to enroll, lowercase 3-20 chars matching the new
#            HANDLE_REGEX (a-z 0-9 . - _; no leading/trailing or
#            consecutive separators).

appId: xyz.speakeasyapp.app
---

# ─── Step 01: Door ───
- extendedWaitUntil:
    visible:
      id: "onboarding-door-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-door-continue"

# ─── Step 02: The room ───
- extendedWaitUntil:
    visible:
      id: "onboarding-room-continue"
    timeout: 10000
- tapOn:
    id: "onboarding-room-continue"

# ─── Step 03: Handle ───
- extendedWaitUntil:
    visible:
      id: "onboarding-handle"
    timeout: 10000
- tapOn:
    id: "onboarding-handle"
- inputText: ${HANDLE}

# Belt-and-suspenders ANR mitigation: a hung Pixel Launcher can
# pop "isn't responding" mid-flow and steal focus, blanking the
# handle field we just typed into. The CI script disables the
# launcher (pm disable-user) but if that didn't take, dismiss.
- tapOn:
    text: "Wait"
    optional: true

# Availability indicator reads "available" (lowercase, no @ prefix —
# spec §2.3.1 indicator copy). 30s for the cold-boot CI emulator's
# slower network.
- extendedWaitUntil:
    visible:
      text: "available"
    timeout: 30000

- tapOn:
    id: "onboarding-continue"

# Vouchflow's verify() shows BiometricPrompt; emulator has a PIN
# but no fingerprint, so Android falls back to PIN entry from
# com.android.systemui. Type 0000 to dismiss.
- runFlow: _unlock-biometric-prompt.yaml

# Defensive: any post-claim system Alert dismisses cleanly.
- tapOn:
    text: "OK"
    optional: true

# ─── Step 04: Face ───
# Spec §2.4: 12-animal grid, 3×4. Tap any cell — the first one is fine
# since the Tier B harness only verifies the flow completes, not which
# animal is rendered. Then "Open the door" advances into the workspace.
- extendedWaitUntil:
    visible:
      id: "onboarding-face-fox"
    timeout: 15000
- tapOn:
    id: "onboarding-face-fox"
- tapOn:
    id: "onboarding-face-confirm"

# Race condition (documented in 01-enroll.yaml): after setUserId the
# navigator flips to the authed stack; the navigation.replace
# ('IdReveal') in the parent route may lose the race. Wait directly
# for the conversations tab.
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 30000
