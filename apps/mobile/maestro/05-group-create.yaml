# Tier B flow #5 — group create + send.
#
# Self-contained: enrolls fresh, opens NewGroup, names the group, adds
# a bogus peer id, creates, and verifies the GroupChatScreen appears.

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-continue"
# Handle IdReveal if it appears (fresh enroll).
- runFlow:
    when:
      visible:
        id: "id-reveal-get-started"
    commands:
      - tapOn:
          id: "id-reveal-get-started"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 15000
- tapOn:
    id: "conversations-new-group"
- extendedWaitUntil:
    visible:
      id: "new-group-name-input"
    timeout: 5000
- tapOn:
    id: "new-group-name-input"
- inputText: "weekend plans"
- tapOn:
    id: "new-group-members-input"
- inputText: "silent-golden-hawk"
- tapOn:
    id: "new-group-create"
# Successful create → navigated to GroupChat. Header shows "# weekend plans".
- extendedWaitUntil:
    visible: "# weekend plans"
    timeout: 20000
- assertVisible:
    id: "chat-input"
