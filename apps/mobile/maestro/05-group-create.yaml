# Maestro flow: Group create error handling (Tier B)
# Tests error handling when trying to add non-existent member to group

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss cold-boot ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
# Handle BiometricPrompt PIN fallback (CI emulator, no fingerprint)
- runFlow: _unlock-biometric-prompt.yaml
# OnboardingScreen race: navigator flips to Auth stack (initialRoute:
# Conversations) before navigation.replace("IdReveal") fires, so IdReveal
# is usually skipped. Wait directly for Conversations (matches 01-enroll).

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Navigate to new group
- tapOn:
    text: "# New group"

# Wait for new group screen
- extendedWaitUntil:
    visible:
      id: "new-group-screen"
    timeout: 10000

# Enter group name
- inputText: "weekend plans"

# Enter a valid-format but non-existent member
# Note: The placeholder is multiline, tap on the second line if needed
- tapOn:
    id: "new-group-members-input"
- inputText: "quiet-empty-mountain"

# Tap create group (should fail with "No such user")
- tapOn:
    text: "Create group"

# Verify error message appears
- assertVisible:
    text: "No such user"
