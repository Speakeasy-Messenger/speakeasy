# Maestro flow: Group create error handling (Tier B)
# Tests error handling when trying to add non-existent member to group

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss the keyguard PIN that re-engaged on clearState.
- runFlow: _dismiss-keyguard.yaml

# Dismiss cold-boot ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
# Pick a handle — Continue is disabled until availability=available.
- tapOn:
    id: "onboarding-handle"
- inputText: "tierbfive"
- extendedWaitUntil:
    visible: "@tierbfive is available."
    timeout: 10000
- tapOn:
    text: "Continue"
# Handle BiometricPrompt PIN fallback (CI emulator, no fingerprint)
- runFlow: _unlock-biometric-prompt.yaml
# OnboardingScreen race: navigator flips to Auth stack (initialRoute:
# Conversations) before navigation.replace("IdReveal") fires, so IdReveal
# is usually skipped. Wait directly for Conversations (matches 01-enroll).

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Navigate to new group
- tapOn:
    text: "# New group"

# Wait for new group screen
- extendedWaitUntil:
    visible:
      id: "new-group-screen"
    timeout: 10000

# Enter group name
- inputText: "weekend plans"

# Enter a valid-format but non-existent member handle
# Note: The placeholder is multiline, tap on the second line if needed
- tapOn:
    id: "new-group-members-input"
- inputText: "ghosthandle"

# Tap create group (should fail with "No such user")
- tapOn:
    text: "Create group"

# Verify error banner appears. Assert by testID (see flow 04 for the
# rationale — text-match against the multi-line error string races
# Maestro's accessibility tree). Vouchflow `requireAuth` revalidation
# latency makes the round-trip ~10s on CI, so 30s timeout.
- extendedWaitUntil:
    visible:
      id: "new-group-error"
    timeout: 30000
