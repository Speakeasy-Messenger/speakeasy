# Maestro flow: Group creation happy path (Tier B)
#
# Verifies enroll → open new-group sheet → name + add a member →
# Create group lands on the GroupChatScreen. Asserts the chat input
# is visible (which only renders inside group-chat-screen) as the
# success signal.
#
# Note: the server's InMemoryGroupRepo.addMember doesn't validate
# user existence — adding any well-formed handle succeeds with 201.
# That's why we don't assert an error here even when the member
# isn't enrolled; the flow is testing creation mechanics, not
# membership validation.

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester05

# Navigate to new group — secondary FAB (hash icon) on the bottom-right
# of the Conversations screen (Phase 6 UX rebuild replaced the inline
# "# New group" button with this FAB).
- tapOn:
    id: "conversations-new-group"

- extendedWaitUntil:
    visible:
      id: "new-group-screen"
    timeout: 10000

# Group name
- inputText: "weekend plans"

# Add a single member (well-formed handle; server accepts unknown
# handles via repo.addMember without validating existence).
- tapOn:
    id: "new-group-members-input"
- inputText: "quiet-empty-mountain"

- tapOn:
    text: "Create group"

# Success signal: we land on the GroupChatScreen. The chat input is
# only rendered inside that screen, so its visibility is a clean
# "we got past createGroup + addMember + nav" assertion. Generous
# window because two server roundtrips (createGroup → addMember)
# happen in series.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
