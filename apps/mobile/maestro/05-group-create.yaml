# Maestro flow: Group create error handling (Tier B)
# Tests error handling when trying to add non-existent member to group

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss ANR dialog if present
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Wait"

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-screen"
    timeout: 10000
- tapOn:
    text: "Get started"

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Navigate to new group
- tapOn:
    text: "# New group"

# Wait for new group screen
- extendedWaitUntil:
    visible:
      id: "new-group-screen"
    timeout: 10000

# Enter group name
- inputText: "weekend plans"

# Enter a valid-format but non-existent member
# Note: The placeholder is multiline, tap on the second line if needed
- tapOn:
    id: "new-group-members-input"
- inputText: "quiet-empty-mountain"

# Tap create group (should fail with "No such user")
- tapOn:
    text: "Create group"

# Verify error message appears
- assertVisible:
    text: "No such user"
