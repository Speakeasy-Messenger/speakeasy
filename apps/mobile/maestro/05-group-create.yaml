appId: xyz.speakeasyapp.app
name: Group create
tags:
  - tier-b

---

# Run enrollment first
- runFlow: 01-enroll.yaml

# Start new group
- tapOn:
    text: "# New group"

- extendedWaitUntil:
    id: group-name-input
    timeout: 5000

- tapOn:
    id: group-name-input

- inputText: "weekend plans"

# Add a member
- tapOn:
    id: member-id-input

- inputText: "silent-golden-hawk"

- tapOn:
    text: "Add"

# Create the group
- tapOn:
    text: "Create"

# Verify group chat screen appears
- extendedWaitUntil:
    id: group-chat-header
    timeout: 10000

- assertVisible:
    id: group-chat-header

- assertVisible:
    id: chat-input

- assertVisible:
    id: chat-send
