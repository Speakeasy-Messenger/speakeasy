# Maestro flow: Group create error handling (Tier B)
# Tests error handling when trying to add non-existent member to group

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester05

# Navigate to new group — secondary FAB (hash icon) on the bottom-right
# of the Conversations screen (Phase 6 UX rebuild replaced the inline
# "# New group" button with this FAB).
- tapOn:
    id: "conversations-new-group"

# Wait for new group screen
- extendedWaitUntil:
    visible:
      id: "new-group-screen"
    timeout: 10000

# Enter group name
- inputText: "weekend plans"

# Enter a valid-format but non-existent member
# Note: The placeholder is multiline, tap on the second line if needed
- tapOn:
    id: "new-group-members-input"
- inputText: "quiet-empty-mountain"

# Tap create group (should fail with "No such user")
- tapOn:
    text: "Create group"

# Verify error message appears. Server roundtrip can take >10s in CI
# (Vouchflow sandbox + Fastify in-runner), so use extendedWaitUntil
# with a generous window. Bare assertVisible races the API response.
- extendedWaitUntil:
    visible:
      text: "No such user"
    timeout: 25000
