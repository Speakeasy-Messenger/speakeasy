# Maestro flow: Group creation happy path (Tier B)
#
# Verifies enroll → open new-group sheet → name + add a member →
# Create group lands on the GroupChatScreen. Asserts the chat input
# is visible (which only renders inside group-chat-screen) as the
# success signal.
#
# Note: the server's InMemoryGroupRepo.addMember doesn't validate
# user existence — adding any well-formed handle succeeds with 201.
# That's why we don't assert an error here even when the member
# isn't enrolled; the flow is testing creation mechanics, not
# membership validation.

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester05

# NEW-CONVERSATION.md §3: FAB → Find Someone sheet → "create a room"
# footer link navigates to the room creation screen.
- tapOn:
    id: "conversations-fab"
- tapOn:
    id: "find-sheet-create-room"

- extendedWaitUntil:
    visible:
      id: "new-group-screen"
    timeout: 10000

# NEW-CONVERSATION.md §4: members come in via the find sheet now
# (no more comma-separated textarea). Add a single peer through the
# add-to-room mode of the find sheet, then enter the room name, then
# tap Create in the AppBar.

# Add a member: open the find sheet, type a handle, tap the result.
#
# Caveat: the Find Someone sheet now does a real availability check
# before surfacing the result card, so this requires an *enrolled*
# peer handle. The previous flow used `quiet-empty-mountain` (a fake
# handle that the in-memory groups repo accepted without validation
# of user existence) — that no longer reaches the result-card state.
# Pre-seeding a fixture peer in the dev server is a follow-up; for
# now the rest of the flow assumes a peer named `tester05peer` has
# been enrolled out-of-band.
- tapOn:
    id: "new-group-add-member"
- tapOn:
    id: "find-sheet-input"
- inputText: "tester05peer"
- tapOn:
    id: "find-sheet-result"

# Name the room.
- tapOn:
    id: "new-group-name-input"
- inputText: "weekend plans"
- hideKeyboard

# Create action lives in the AppBar now (right-aligned).
- tapOn:
    id: "new-group-create"

# Success signal: we land on the GroupChatScreen. The chat input is
# only rendered inside that screen, so its visibility is a clean
# "we got past createGroup + addMember + nav" assertion. Generous
# window because two server roundtrips (createGroup → addMember)
# happen in series.
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 30000
