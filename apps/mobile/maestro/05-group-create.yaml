# Maestro flow: Create a group chat
# Uses explicit text: selectors for tapOn (Maestro 2.5.1 compatibility)

appId: xyz.speakeasyapp.app
---
# First run enrollment flow
- runFlow: 01-enroll.yaml

# Tap # New group button
- tapOn:
    text: "# New group"

# Wait for new group screen
- assertVisible:
    id: "new-group-screen"

# Enter group name
- tapOn:
    text: "weekend plans"
- inputText: "Test Group"

# Add a member (use test peer ID)
- tapOn:
    text: "silent-golden-hawk"
- inputText: "test-peer-123"

# Tap Create button
- tapOn:
    text: "Create"

# Verify group chat screen appears
- assertVisible:
    id: "group-chat-screen"

# Send a message to the group
- tapOn:
    text: "Say it…"
- inputText: "Hello group!"

# Tap send button
- tapOn:
    id: "chat-send"

# Verify message appears
- assertVisible: "Hello group!"
