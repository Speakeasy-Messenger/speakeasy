# Maestro flow: Calls tab smoke test (Tier B)
#
# Catches the class of bugs that hit alpha 0.4.21–0.4.24:
#   - Native module load failures under release-mode bundle
#     (rn-webrtc / event-target-shim mismatch)
#   - CallKeep autolinking issues that crash the app at module load
#   - WebRTC peer construction or `getUserMedia` regressions
#   - Missing testIDs / regressed nav after UI rebuilds
#
# Strategy: enroll → switch to the Calls tab → enter a non-existent
# peer handle → tap dial. The orchestrator's outbound chain runs in
# this order:
#
#   1. fetchIceServers           (network — falls back to STUN-only)
#   2. peerFactory.create        (JS class init — was the 0.4.24 bug)
#   3. peer.createOffer          (getUserMedia + native WebRTC)
#   4. sendEncrypted             (Signal session-ensure → fetchPreKeyBundle)
#
# Step 4 fails for a non-existent peer (404), the orchestrator throws,
# and CallsScreen surfaces "Couldn't start call: …" inline. So if we
# see that text we know steps 1–3 didn't crash — the very class of
# bugs Tier B is here to catch.
#
# Real call connection isn't tested here — the emulator has no mic
# input and there's no peer device. That'd require a paired emulator
# pair with a TURN relay reachable from the runner; out of scope for
# now.
#
# Pre-condition: RECORD_AUDIO must be pre-granted via
# `adb shell pm grant xyz.speakeasyapp.app android.permission.RECORD_AUDIO`
# in the workflow's emulator script — otherwise getUserMedia blocks
# on the system permission dialog and the flow times out.

appId: xyz.speakeasyapp.app
name: Calls tab smoke (Tier B)
---

- clearState
- clearKeychain
- launchApp

- tapOn:
    text: "Wait"
    optional: true

- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
- runFlow: _unlock-biometric-prompt.yaml

- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Switch to the Calls tab. RootNavigator's tabBarLabelStyle uppercases
# the labels, so we tap on "CALLS".
- tapOn:
    text: "CALLS"

- extendedWaitUntil:
    visible:
      id: "calls-screen"
    timeout: 10000

# Enter a peer handle that's guaranteed not enrolled in the in-runner
# fixture. The dialer rejects malformed handles client-side, so we
# pick a valid 3-word format.
- tapOn:
    id: "calls-dial-input"
- inputText: "quiet-empty-mountain"

# Tap dial. This is the WebRTC stress test — if the native pipeline
# is broken, the app dies here before the orchestrator can throw.
- tapOn:
    id: "calls-dial-btn"

# Expected outcome: orchestrator throws after fetchPreKeyBundle 404,
# CallsScreen renders "Couldn't start call: …" inline. The 15s
# window covers TURN credential fetch + WebRTC init + getUserMedia +
# offer creation + the failing prekey fetch.
- extendedWaitUntil:
    visible:
      text: "Couldn't start call"
    timeout: 15000
