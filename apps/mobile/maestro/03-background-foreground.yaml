appId: xyz.speakeasyapp.app
name: Background/Foreground lifecycle
tags:
  - tier-b

---

# Run enrollment first
- runFlow: 01-enroll.yaml

# Create a self-DM to have content
- tapOn:
    text: "+ New chat"

- extendedWaitUntil:
    id: new-chat-input
    timeout: 5000

- tapOn:
    id: new-chat-input

- inputText: "me"

- tapOn:
    text: "Start"

- extendedWaitUntil:
    id: chat-input
    timeout: 10000

- tapOn:
    id: chat-input

- inputText: "Background test"

- tapOn:
    id: chat-send

# Send app to background
- runFlow:
    when:
      platform: Android
    commands:
      - backgroundApp

- wait: 3000

# Bring app back to foreground
- runFlow:
    when:
      platform: Android
    commands:
      - launchApp

# Verify still on chat screen with message
- extendedWaitUntil:
    id: chat-input
    timeout: 10000

- assertVisible:
    id: chat-input

# Send another message
- tapOn:
    id: chat-input

- inputText: "Foreground works"

- tapOn:
    id: chat-send

- extendedWaitUntil:
    id: chat-input
    timeout: 10000
