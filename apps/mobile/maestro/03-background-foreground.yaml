# Maestro flow: Background/foreground lifecycle test
# Uses explicit text: selectors for tapOn (Maestro 2.5.1 compatibility)

appId: com.speakeasy.app
---
# First run enrollment flow
- runFlow: 01-enroll.yaml

# Verify we're on conversations screen
- assertVisible:
    id: "conversations-screen"

# Send app to background
- backgroundApp

# Wait a moment
- waitForAnimationToEnd:
    timeout: 2000

# Bring app back to foreground
- launchApp

# Verify we're still on conversations screen
- assertVisible:
    id: "conversations-screen"

# Navigate to a chat to verify state preserved
- tapOn:
    text: "+ New chat"
- assertVisible:
    id: "new-chat-screen"
- back
