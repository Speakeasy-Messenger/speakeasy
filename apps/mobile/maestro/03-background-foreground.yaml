# Tier B flow #3 — background/foreground lifecycle.
#
# Enrolls fresh, sends a self-DM (so there's a row to look for after
# relaunch), backgrounds + relaunches the app, asserts identity + the
# row are restored.

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-continue"
# Enroll lands on Conversations directly. Capture userId from header.
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 15000
- copyTextFrom:
    id: "conversations-userid"
- tapOn:
    id: "conversations-new-chat"
- tapOn:
    id: "new-chat-peer-id-input"
- pasteText
- tapOn:
    id: "new-chat-start"
- extendedWaitUntil:
    visible:
      id: "chat-input"
    timeout: 10000
- tapOn:
    id: "chat-input"
- inputText: "before background"
- tapOn:
    id: "chat-send"
- extendedWaitUntil:
    visible: "before background"
    timeout: 10000
- tapOn:
    id: "chat-back"
- waitForAnimationToEnd
# Background + relaunch (clearState: false so AsyncStorage persistence
# is exercised — this is the actual behavior under test).
- pressKey: Home
- waitForAnimationToEnd
- launchApp:
    clearState: false
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 10000
- extendedWaitUntil:
    visible: "before background"
    timeout: 5000
