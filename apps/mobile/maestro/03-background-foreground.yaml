# Maestro flow: Background/foreground lifecycle (Tier B)
# Tests app state persistence after backgrounding

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss cold-boot ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# Run shared enrollment flow (types handle, waits for availability,
# taps Continue, dismisses BiometricPrompt, asserts conversations-userid).
- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester03

# Remember the user ID
- copyTextFrom:
    id: "conversations-userid"

# Background the app (Maestro 2.x: `backgroundApp` was removed; press
# Home to send the activity to the background instead).
- pressKey: Home

# Wait 2 seconds
- waitForAnimationToEnd:
    timeout: 2000

# Foreground the app
- launchApp

# Verify state is preserved - should see same user ID
- assertVisible:
    id: "conversations-userid"
- assertVisible:
    text: "${maestro.copiedText}"
