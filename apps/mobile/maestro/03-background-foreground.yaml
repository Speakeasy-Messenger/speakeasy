# Tier B flow #3 — background/foreground lifecycle.

appId: xyz.speakeasyapp.app
---
- assertVisible:
    id: "conversations-userid"
- pressKey: Home
- waitForAnimationToEnd
- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 10000
- extendedWaitUntil:
    visible: "yo from maestro"
    timeout: 5000
