# Maestro flow: Peer not found (Tier B)
# Tests error handling when trying to chat with non-existent user

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss cold-boot ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
# Handle BiometricPrompt PIN fallback (CI emulator, no fingerprint)
- runFlow: _unlock-biometric-prompt.yaml
# OnboardingScreen race: navigator flips to Auth stack (initialRoute:
# Conversations) before navigation.replace("IdReveal") fires, so IdReveal
# is usually skipped. Wait directly for Conversations (matches 01-enroll).

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Navigate to new chat
- tapOn:
    text: "+ New chat"

# Wait for new chat screen
- extendedWaitUntil:
    visible:
      id: "new-chat-screen"
    timeout: 10000

# Enter a valid-format but non-existent peer ID
- inputText: "quiet-empty-mountain"

# Tap start (should fail with "No such user")
- tapOn:
    text: "Start chat"

# Verify error message appears. The error doesn't render until the
# Start chat → fetchPreKeyBundle round-trip finishes, so we need a
# wait window — bare assertVisible has no timeout and races the
# API response.
- extendedWaitUntil:
    visible:
      text: "No such user"
    timeout: 10000
