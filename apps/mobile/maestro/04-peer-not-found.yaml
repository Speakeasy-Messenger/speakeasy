appId: xyz.speakeasyapp.app
name: Peer not found
tags:
  - tier-b

---

# Run enrollment first
- runFlow: 01-enroll.yaml

# Start new chat
- tapOn:
    text: "+ New chat"

- extendedWaitUntil:
    id: new-chat-input
    timeout: 5000

- tapOn:
    id: new-chat-input

- inputText: "nonexistent-ghost-phantom"

- tapOn:
    text: "Start"

# Wait for error - peer not found
- extendedWaitUntil:
    id: chat-error
    timeout: 10000

- assertVisible:
    id: chat-error

- copyTextFrom:
    id: chat-error

- assertTrue:
    condition: "${maestro.copiedText} =~ /not found/"
