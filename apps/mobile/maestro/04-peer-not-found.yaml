# Maestro flow: Peer not found (Tier B)
# Tests error handling when trying to chat with non-existent user

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester04

# Navigate to new chat — FAB on the bottom-right (Phase 6 UX rebuild).
- tapOn:
    id: "conversations-new-chat"

# Wait for new chat screen
- extendedWaitUntil:
    visible:
      id: "new-chat-screen"
    timeout: 10000

# Enter a valid-format but non-existent peer ID
- inputText: "quiet-empty-mountain"

# Tap start (should fail with "No such user")
- tapOn:
    text: "Start chat"

# Verify the error renders. We assert by testID rather than text
# because the actual error string ("No such user. Speakeasy IDs are
# case-sensitive — double-check it.") wasn't being matched by
# Maestro's text regex against the RN accessibility tree even when
# the screenshot showed it visually present. testID is the resilient
# selector here.
- extendedWaitUntil:
    visible:
      id: "new-chat-error"
    timeout: 25000
