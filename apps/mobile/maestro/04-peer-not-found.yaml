# Maestro flow: Peer not found error handling
# Uses explicit text: selectors for tapOn (Maestro 2.5.1 compatibility)

appId: com.speakeasy.app
---
# First run enrollment flow
- runFlow: 01-enroll.yaml

# Tap + New chat button
- tapOn:
    text: "+ New chat"

# Wait for new chat screen
- assertVisible:
    id: "new-chat-screen"

# Enter a non-existent peer ID
- tapOn:
    text: "silent-golden-hawk"
- inputText: "nonexistent-ghost-xyz"

# Tap Start
- tapOn:
    text: "Start"

# Verify error message appears
- assertVisible: "Peer not found"

# Navigate back
- back

# Verify we're back on conversations screen
- assertVisible:
    id: "conversations-screen"
