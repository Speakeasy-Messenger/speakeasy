# Maestro flow: Peer not found (Tier B)
# Tests error handling when trying to chat with non-existent user

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester04

# NEW-CONVERSATION.md §3: FAB opens the Find Someone sheet directly.
# Type a non-existent handle; the sheet's state region renders
# "no one by that name" — no separate error screen.
- tapOn:
    id: "conversations-fab"
- extendedWaitUntil:
    visible:
      id: "find-sheet"
    timeout: 10000

- tapOn:
    id: "find-sheet-input"
- inputText: "quiet_empty_mountain"

# Verify the not-found state renders. The lookup debounces 300ms +
# the server roundtrip; allow up to 25s for slow CI emulators.
- extendedWaitUntil:
    visible:
      text: "no one by that name"
    timeout: 25000
