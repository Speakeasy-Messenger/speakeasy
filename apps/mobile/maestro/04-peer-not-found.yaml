# Maestro flow: Peer not found (Tier B)
# Tests error handling when trying to chat with non-existent user

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss ANR dialog if present
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Wait"

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-screen"
    timeout: 10000
- tapOn:
    text: "Get started"

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Navigate to new chat
- tapOn:
    text: "+ New chat"

# Wait for new chat screen
- extendedWaitUntil:
    visible:
      id: "new-chat-screen"
    timeout: 10000

# Enter a valid-format but non-existent peer ID
- inputText: "quiet-empty-mountain"

# Tap start (should fail with "No such user")
- tapOn:
    text: "Start"

# Verify error message appears
- assertVisible:
    text: "No such user"
