# Maestro flow: Peer not found (Tier B)
# Tests error handling when trying to chat with non-existent user

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester04

# Navigate to new chat — FAB on the bottom-right (Phase 6 UX rebuild).
- tapOn:
    id: "conversations-new-chat"

# Wait for new chat screen
- extendedWaitUntil:
    visible:
      id: "new-chat-screen"
    timeout: 10000

# Enter a valid-format but non-existent peer ID
- inputText: "quiet-empty-mountain"

# Tap start (should fail with "No such user")
- tapOn:
    text: "Start chat"

# Verify error message appears. The error doesn't render until the
# Start chat → fetchPreKeyBundle round-trip finishes, which in CI
# (Vouchflow sandbox + Fastify in-runner + emulator I/O) can take
# >10s. The current text reads "No such user. Speakeasy IDs are
# case-sensitive — double-check it." — `text:` is regex / substring
# matching, so the leading prefix is enough to match.
- extendedWaitUntil:
    visible:
      text: "No such user"
    timeout: 25000
