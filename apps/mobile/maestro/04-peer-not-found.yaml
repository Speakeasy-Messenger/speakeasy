# Tier B flow #4 — peer-not-found surfaces at chat-open.

appId: xyz.speakeasyapp.app
---
- launchApp:
    clearState: true
    clearKeychain: true
- runFlow:
    when:
      visible: "Wait"
    commands:
      - tapOn: "Wait"
- extendedWaitUntil:
    visible:
      id: "onboarding-continue"
    timeout: 30000
- tapOn:
    id: "onboarding-continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-get-started"
    timeout: 15000
- tapOn:
    id: "id-reveal-get-started"
- extendedWaitUntil:
    visible:
      id: "conversations-userid"
    timeout: 5000
- tapOn:
    id: "conversations-new-chat"
- assertVisible:
    id: "new-chat-peer-id-input"
- tapOn:
    id: "new-chat-peer-id-input"
- inputText: "definitely-fake-userid"
- tapOn:
    id: "new-chat-start"
- extendedWaitUntil:
    visible: "No such user.*"
    timeout: 8000
- assertNotVisible:
    id: "chat-input"
