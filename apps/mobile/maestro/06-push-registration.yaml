# Maestro flow: Verify push token registration doesn't break app (Tier B)
# After enrollment, send a self-DM to confirm app remains functional

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss ANR dialog if present
- retry:
    maxRetries: 3
    commands:
      - tapOn:
          text: "Wait"

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
- tapOn:
    text: "Continue"
- extendedWaitUntil:
    visible:
      id: "id-reveal-screen"
    timeout: 10000
- tapOn:
    text: "Get started"

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Copy user's own ID
- copyTextFrom:
    id: "conversations-userid"

# Navigate to new chat
- tapOn:
    text: "+ New chat"

# Paste own ID and start chat (self-DM)
- tapOn:
    placeholder: "silent-golden-hawk"
- inputText: "${COPY_TEXT}"
- tapOn:
    text: "Start"

# Send a message
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000
- tapOn:
    placeholder: "Say it…"
- inputText: "Testing push registration"
- tapOn:
    text: "Send"

# Verify message appears
- extendedWaitUntil:
    visible:
      text: "Testing push registration"
    timeout: 5000
