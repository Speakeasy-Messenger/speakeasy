appId: xyz.speakeasyapp.app
name: Push token registration
tags:
  - tier-b

---

# Run enrollment first
- runFlow: 01-enroll.yaml

# Send a self DM to verify app is functional
- tapOn:
    text: "+ New chat"

- extendedWaitUntil:
    id: peer-id-input
    timeout: 5000

- tapOn:
    id: peer-id-input

- inputText: "silent-golden-hawk"

- tapOn:
    text: "Start"

- extendedWaitUntil:
    id: chat-input
    timeout: 10000

- tapOn:
    id: chat-input

- inputText: "push test message"

- tapOn:
    id: chat-send

# Verify message appears
- extendedWaitUntil:
    id: chat-messages
    timeout: 10000

- assertVisible:
    id: chat-messages

# Go back to conversations
- back

- extendedWaitUntil:
    id: conversations-list
    timeout: 5000

- assertVisible:
    id: conversations-list
