# Maestro flow: Verify push token registration doesn't break app (Tier B)
# After enrollment, send a self-DM to confirm app remains functional

appId: xyz.speakeasyapp.app
---
# Clear state and enroll fresh
- clearState
- clearKeychain
- launchApp

# Dismiss the keyguard PIN that re-engaged on clearState.
- runFlow: _dismiss-keyguard.yaml

# Dismiss cold-boot ANR dialog if present
- tapOn:
    text: "Wait"
    optional: true

# Navigate through onboarding
- extendedWaitUntil:
    visible:
      id: "onboarding-screen"
    timeout: 30000
# Pick a handle — Continue is disabled until availability=available.
- tapOn:
    id: "onboarding-handle"
- inputText: "tierbsix"
- extendedWaitUntil:
    visible: "@tierbsix is available."
    timeout: 10000
- tapOn:
    text: "Continue"
# Handle BiometricPrompt PIN fallback (CI emulator, no fingerprint)
- runFlow: _unlock-biometric-prompt.yaml
# OnboardingScreen race: navigator flips to Auth stack (initialRoute:
# Conversations) before navigation.replace("IdReveal") fires, so IdReveal
# is usually skipped. Wait directly for Conversations (matches 01-enroll).

# Wait for enrollment to complete
- extendedWaitUntil:
    visible:
      id: "conversations-screen"
    timeout: 30000

# Copy user's own ID
- copyTextFrom:
    id: "conversations-userid"

# Navigate to new chat
- tapOn:
    text: "+ New chat"

# Paste own handle and start chat (self-DM)
- tapOn:
    id: "new-chat-peer-id-input"
- inputText: "${maestro.copiedText}"
- tapOn:
    text: "Start chat"

# Send a message
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000
- tapOn:
    placeholder: "Say it…"
- inputText: "Testing push registration"
- tapOn:
    text: "Send"

# Verify message appears
- extendedWaitUntil:
    visible:
      text: "Testing push registration"
    timeout: 5000
