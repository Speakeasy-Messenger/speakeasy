# Maestro flow: Verify push token registration doesn't break app (Tier B)
# After enrollment, send a self-DM to confirm app remains functional

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester06

# NEW-CONVERSATION.md §3: FAB → Find Someone sheet → type → tap result.
# Type our own (just-enrolled, known) handle for the self-DM rather
# than copying it out of the header — see 02-self-dm.yaml.
- tapOn:
    id: "conversations-fab"
- tapOn:
    id: "find-sheet-input"
- inputText: "tester06"
- tapOn:
    id: "find-sheet-result"

# Send a message. Send button is an accent icon (testID `chat-send`)
# that only renders once the input has content — brand §6.5.
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000
- tapOn:
    id: "chat-input"
- inputText: "Testing push registration"
- tapOn:
    id: "chat-send"

# Verify message appears
- extendedWaitUntil:
    visible:
      text: "Testing push registration"
    timeout: 5000
