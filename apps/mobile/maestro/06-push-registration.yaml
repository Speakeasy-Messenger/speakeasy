# Maestro flow: Verify push token registration doesn't break app (Tier B)
# After enrollment, send a self-DM to confirm app remains functional

appId: xyz.speakeasyapp.app
---
- clearState
- clearKeychain
- launchApp
- tapOn:
    text: "Wait"
    optional: true

- runFlow:
    file: _enroll-with-handle.yaml
    env:
      HANDLE: tester06

# Copy user's own ID
- copyTextFrom:
    id: "conversations-userid"

# Navigate to new chat — FAB on the bottom-right (Phase 6 UX rebuild).
- tapOn:
    id: "conversations-new-chat"

# Paste own ID and start chat (self-DM). Use testIDs — `placeholder:`
# is not a Maestro selector property.
- tapOn:
    id: "new-chat-peer-id-input"
- inputText: "${maestro.copiedText}"
- tapOn:
    text: "Start chat"

# Send a message. Send button is an accent icon (testID `chat-send`)
# that only renders once the input has content — brand §6.5.
- extendedWaitUntil:
    visible:
      id: "chat-screen"
    timeout: 10000
- tapOn:
    id: "chat-input"
- inputText: "Testing push registration"
- tapOn:
    id: "chat-send"

# Verify message appears
- extendedWaitUntil:
    visible:
      text: "Testing push registration"
    timeout: 5000
