# Maestro flow: Verify push token registration after enrollment
# Uses explicit text: selectors for tapOn (Maestro 2.5.1 compatibility)

appId: com.speakeasy.app
---
# First run enrollment flow
- runFlow: 01-enroll.yaml

# Verify we're on conversations screen
- assertVisible:
    id: "conversations-screen"

# Send a self-DM to ensure app is fully functional
- tapOn:
    text: "+ New chat"
- assertVisible:
    id: "new-chat-screen"
- tapOn:
    text: "silent-golden-hawk"
- inputText: "myself"
- tapOn:
    text: "Start"
- assertVisible:
    id: "chat-screen"
- tapOn:
    text: "Say it…"
- inputText: "Push test"
- tapOn:
    id: "chat-send"
- assertVisible: "Push test"

# Navigate back to conversations
- back
- assertVisible:
    id: "conversations-screen"
