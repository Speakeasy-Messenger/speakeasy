# Fly.io production config for the Speakeasy API — Phase 4 hardening.
#
# Deploy:        flyctl deploy --config infra/fly/api.toml --dockerfile apps/api/Dockerfile
# Scale check:   flyctl scale show
# Logs:          flyctl logs
# Volume snaps:  managed at the Postgres app level — see infra/fly/README.md
#
# External dependencies (provisioned separately):
#   - Postgres:  flyctl postgres create --name speakeasy-db
#   - Redis:     flyctl redis create     --name speakeasy-redis
# Then `flyctl postgres attach speakeasy-db --app speakeasy-api` and
# `flyctl secrets set REDIS_URL=$(flyctl redis status speakeasy-redis -j | jq -r .private_url)`.

app = "speakeasy-api"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "30s"

[build]
  dockerfile = "../../apps/api/Dockerfile"

[env]
  PORT = "8080"
  HOST = "0.0.0.0"
  NODE_ENV = "production"
  LOG_LEVEL = "info"
  # VOUCHFLOW_BASE_URL set at deploy time — sandbox vs live.
  # Prometheus /metrics on the main listener (same port as app traffic;
  # no separate :9091 to expose). Scraped by Fly's internal Prometheus.
  METRICS_ENABLED = "1"

# Phase 4: keep at least 2 instances so a rolling deploy / one-machine crash
# never drops the WS pool below cluster-redundant. Cross-instance ack
# routing through Redis pub/sub depends on at least one peer being live.
[deploy]
  strategy = "rolling"
  release_command = "npm run db:migrate"

[[services]]
  protocol = "tcp"
  internal_port = 8080
  # Keep machines warm — WS pools + Vouchflow short-lived caches are not
  # worth losing to autostop. We accept the higher idle bill.
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 2
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  # Tuned for WS-heavy + REST mix. Soft limit drives autoscale; hard limit
  # is the cliff. Vouchflow validation adds ~50–500ms per HTTP hit, so
  # actual safe concurrency per cpu is well under the raw socket count.
  [services.concurrency]
    type = "connections"
    hard_limit = 1500
    soft_limit = 1000

  [[services.tcp_checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "10s"

  [[services.http_checks]]
    interval = "10s"
    timeout = "3s"
    grace_period = "15s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    restart_limit = 3

[[vm]]
  cpu_kind = "shared"
  cpus = 2
  memory_mb = 1024

# (METRICS_ENABLED moved into the main [env] block above — TOML treats
# multiple [env] blocks as a merge, but the duplicate was confusing.)
