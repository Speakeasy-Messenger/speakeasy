# gitleaks configuration — consumed by .github/workflows/secret-scan.yml.
title = "Speakeasy secret-scan config"

[extend]
# Build on top of gitleaks' built-in rule set.
useDefault = true

[allowlist]
description = "Paths and values excluded from secret scanning."
paths = [
  # Vendored third-party source (libsignal) — kept locally for source
  # inspection only, not part of any build (see CLAUDE.md). Its crypto
  # test vectors trip the generic-api-key entropy heuristic. Not tracked
  # in git, so this entry only matters for local working-tree scans.
  '''apps/mobile/ios/Vendor/.*''',
  # Firebase client config. The value flagged as a "GCP API key" is a
  # client identifier shipped inside every distributed copy of the app,
  # not a server secret. It is secured by Google Cloud API key
  # restrictions (locked to the app's package name + signing SHA), not
  # by being kept out of the repository — tracking it is the documented,
  # normal practice for Firebase clients.
  '''apps/mobile/android/app/google-services\.json''',
  # Production-guard tests use a literal
  #   `-----BEGIN PRIVATE KEY-----\nabc\n-----END PRIVATE KEY-----`
  # fixture to verify the guard accepts a syntactically-valid FCM
  # private key. It is not a secret — the payload between markers is
  # the string `abc` — but gitleaks' `private-key` rule matches on the
  # PEM markers alone. The fixture is part of the test documentation;
  # suppress this file from the scan.
  '''apps/api/src/production-guard\.test\.ts''',
]
