name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Type-check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

  # Detect whether this push touched anything that goes into the API image
  # or its deploy. A monorepo `main` carries BOTH mobile and server commits;
  # a mobile-only push must NOT redeploy the API, because the Fly rolling
  # restart drops every live WS connection and briefly 401s auth / push-
  # token registration for connected devices. (Observed: ~a dozen mobile-
  # only avatar pushes each triggered a restart, which is what disrupted a
  # tester's real-time message delivery + push registration.)
  changes:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Allow-list of everything baked into the API image / deploy.
          # Broad on purpose (errs toward deploying) so a real server
          # change is never silently skipped; only apps/mobile/** (and
          # docs / mobile-release workflows) fall through to "no deploy".
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'infra/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig*.json'
              - '.github/workflows/ci.yml'

  # Deploy the API to Fly when a push to `main` changed API-relevant paths
  # (see `changes`). Gated by `build`, so a failing typecheck/lint/test
  # blocks the deploy. PR runs and mobile-only pushes skip it.
  #
  # Why path-gated and not on tag: the server has no version coupling —
  # `apps/api` does not read git tags, and we want main to track production
  # continuously. Mobile keeps its tag-driven APK release workflow
  # (`release.yml`); server prod = HEAD of main's API code.
  #
  # Manual rollback: `flyctl deploy --image registry.fly.io/speakeasy-api-1:<previous-deployment-id> --config infra/fly/api.toml`.
  # Previous deployment IDs are visible in `flyctl releases --app speakeasy-api-1`.
  deploy-api:
    needs: [build, changes]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Avoid two main-pushes deploying at the same time (later commit
    # would race the earlier one and machines could end up split across
    # versions briefly). Concurrency at the top of the file is already
    # ref-scoped, but it cancels in-progress runs — for deploys we want
    # to QUEUE instead of cancel, so each main commit gets its own
    # full roll. Hence the override here.
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6

      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        # `--config` points at the shared toml; `--dockerfile` mirrors
        # the path documented in `infra/fly/api.toml` header so local
        # `flyctl deploy` and CI deploy stay byte-identical.
        # `--wait-timeout` covers slow registry pushes; defaults are
        # ~2 min which races the second `lhr` machine on cold builds.
        # `--strategy rolling` is fly's default for >1 machine apps
        # but we set it explicitly so any future config edit that
        # downgrades to immediate doesn't silently take effect.
        # `--build-arg GIT_SHA` bakes the commit SHA into the runner
        # image so `/version` can truthfully report it after deploy.
        # See apps/api/Dockerfile + apps/api/src/server.ts getVersion().
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config infra/fly/api.toml \
            --dockerfile apps/api/Dockerfile \
            --build-arg "GIT_SHA=${{ github.sha }}" \
            --strategy rolling \
            --wait-timeout 300 \
            --verbose

      - name: Verify deploy via /version SHA match
        # Two-layer check, both run from outside fly's network so we
        # catch the "machine healthy but proxy didn't pick it up"
        # class of flake:
        #
        #   1. /healthz returns {"ok":true}
        #   2. /version returns the SHORT git SHA that matches this
        #      commit. The Dockerfile builds the version string from
        #      a `--build-arg GIT_SHA=...` arg; if the wrong image
        #      somehow went live (race, rollback, manual deploy
        #      collision) this catches it. Without this, "deploy
        #      succeeded" can mean "we redeployed an older image".
        env:
          EXPECTED_SHA: ${{ github.sha }}
        run: |
          expected_short="${EXPECTED_SHA:0:7}"
          echo "Expecting /version to contain: $expected_short"
          for i in 1 2 3 4 5 6; do
            healthz=$(curl -fsS --max-time 10 https://speakeasy-api-1.fly.dev/healthz || echo "FAIL")
            version=$(curl -fsS --max-time 10 https://speakeasy-api-1.fly.dev/version || echo "FAIL")
            echo "Attempt $i: healthz=$healthz version=$version"
            if echo "$healthz" | grep -q '"ok":true' && echo "$version" | grep -q "$expected_short"; then
              echo "Deploy verified: healthz=ok, version contains $expected_short"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Deploy verification failed after 6 attempts."
          echo "::error::Expected /version to contain $expected_short."
          echo "::error::If /version reports a different SHA, the wrong image went live."
          exit 1
