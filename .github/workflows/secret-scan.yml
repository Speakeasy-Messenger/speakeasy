name: Secret scan

# Scans the repository for committed credentials with gitleaks.
# Rules + allowlist live in .gitleaks.toml at the repo root.
#
# The gitleaks binary is downloaded directly (version-pinned) rather
# than using gitleaks/gitleaks-action: the Action wrapper requires a
# paid GITLEAKS_LICENSE for organisation repositories, while the CLI
# itself is free.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Run gitleaks
        env:
          GITLEAKS_VERSION: 8.21.2
        run: |
          set -euo pipefail
          base="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          archive="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSLO "${base}/${archive}"
          curl -sSLO "${base}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${archive}$" "gitleaks_${GITLEAKS_VERSION}_checksums.txt" | sha256sum -c -
          tar -xzf "${archive}" gitleaks
          # --no-git scans the checked-out working tree; in CI that is
          # exactly the set of committed files. --exit-code 1 fails the
          # job on any finding. .gitleaks.toml is auto-loaded from root.
          ./gitleaks detect --source . --no-git --redact -v --exit-code 1
