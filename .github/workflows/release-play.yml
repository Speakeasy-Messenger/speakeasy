name: Release to Play Store (Internal)

# Triggered alongside the existing direct-download APK release workflow.
# Same `alpha-*` tags, separate job — uploads the signed AAB to the
# Play Console Internal Testing track via the AndroidPublisher REST API.
#
# Internal Testing is a closed list of testers (max 100), invisible to
# anyone outside the list. Safe to run on every RC: doesn't affect
# direct-download testers, doesn't appear in Play Store search, and
# doesn't require Google review.
#
# Auth path: Workload Identity Federation (no static service-account
# JSON to leak/rotate). The GCP-side setup lives in project
# speakeasy-mobile-497702: pool `github-actions-pool`, provider
# `github`, SA `fastlane-play-publisher@speakeasy-mobile-497702`.
# See PARITY / PLAY-STORE-SETUP docs for the GCP console steps.
#
# Releases publish with status=completed — the AAB auto-promotes to the
# Internal Testing tester list on upload, no "Send to testers" click
# needed. See the detailed rationale at the RELEASE_STATUS step below
# (incl. the full-screen-intent declaration caveat).

on:
  push:
    # alpha-*  → alpha RCs → Internal Testing (versionCode = rc number)
    # v*       → production / GA build → Internal Testing, then promote to
    #           Production via play-promote.yml (versionCode = encoded semver)
    tags: ['alpha-*', 'v*']

permissions:
  contents: read
  # google-github-actions/auth requires id-token: write to read the
  # GitHub OIDC token that gets exchanged for a GCP access token.
  id-token: write

jobs:
  release-play:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;27.1.12297006 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-play-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-play-${{ runner.os }}-
            gradle-release-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      - name: Build release AAB
        working-directory: apps/mobile/android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          VOUCHFLOW_WRITE_KEY: ${{ secrets.VOUCHFLOW_WRITE_KEY }}
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$VOUCHFLOW_WRITE_KEY" ]; then
            echo "::error::VOUCHFLOW_WRITE_KEY secret is not set."
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — cannot sign the release AAB."
            exit 1
          fi
          keystore="$RUNNER_TEMP/speakeasy-release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$keystore"
          # bundleRelease produces an .aab (Android App Bundle) instead
          # of the .apk that assembleRelease produces. Play Store only
          # accepts AABs since 2021.
          ./gradlew :app:bundleRelease --no-daemon \
            -Pvouchflow.apiKey="$VOUCHFLOW_WRITE_KEY" \
            -Pvouchflow.environment=production \
            -PRELEASE_STORE_FILE="$keystore"

      - name: Assert built AAB carries the tag version
        # Same defensive check as the APK pipeline — fail before publishing
        # if the version-derivation chain produces a wrong manifest. AABs
        # need bundletool to extract the manifest (aapt2 only handles APK
        # format). bundletool is a single jar; download + run.
        run: |
          tag="${GITHUB_REF##*/}"
          # Mirror app/build.gradle: code = (M*10000+m*100+p)*1000 + sub,
          # sub = rc number for alpha-<semver>-rc.N, else 999 for v<semver>.
          case "$tag" in
            v*-hotfix.*)
              # GA hotfix re-cut: versionName stays the base GA semver, the
              # versionCode advances into the 1000+ hotfix sub-range (see
              # app/build.gradle computedVersionCode). v1.0.1-hotfix.1 →
              # name 1.0.1, code (10001)*1000 + (999+1) = 10002000.
              base_name="${tag#v}"; expected_name="${base_name%-hotfix.*}"
              hf="${tag##*-hotfix.}"; sub=$((999 + 10#$hf)) ;;
            v*)  expected_name="${tag#v}";     sub=999 ;;
            *)   expected_name="${tag#alpha-}"; sub="${tag##*-rc.}" ;;
          esac
          IFS=. read -r MA MI PA <<< "${expected_name%%-*}"
          expected_code=$(( (10#$MA * 10000 + 10#$MI * 100 + 10#$PA) * 1000 + 10#$sub ))
          aab="apps/mobile/android/app/build/outputs/bundle/release/app-release.aab"

          # Pinned to a known-good bundletool release. Bump deliberately;
          # newer versions occasionally change command-line surface area
          # (e.g. xpath output formatting).
          BUNDLETOOL_VERSION=1.18.1
          bundletool="$RUNNER_TEMP/bundletool.jar"
          curl -fsSL -o "$bundletool" \
            "https://github.com/google/bundletool/releases/download/${BUNDLETOOL_VERSION}/bundletool-all-${BUNDLETOOL_VERSION}.jar"

          # bundletool's --xpath returns the attribute value as a plain
          # string on stdout (with a trailing newline). No quoting,
          # no JSON wrapper. Manifest attributes are in the `android:`
          # namespace — omit the prefix and the xpath silently returns
          # empty (bundletool doesn't warn).
          actual_name=$(java -jar "$bundletool" dump manifest --bundle="$aab" --xpath=/manifest/@android:versionName)
          actual_code=$(java -jar "$bundletool" dump manifest --bundle="$aab" --xpath=/manifest/@android:versionCode)

          echo "Expected versionName: $expected_name"
          echo "Expected versionCode: $expected_code"
          echo "Actual versionName:   $actual_name"
          echo "Actual versionCode:   $actual_code"

          fail=0
          if [ "$actual_name" != "$expected_name" ]; then
            echo "::error::AAB versionName ($actual_name) does not match tag ($expected_name)"
            fail=1
          fi
          if [ "$actual_code" != "$expected_code" ]; then
            echo "::error::AAB versionCode ($actual_code) does not match tag-derived code ($expected_code)"
            fail=1
          fi
          exit $fail

      - name: Upload AAB as a downloadable artifact
        # So the signed release bundle can be grabbed from the run even when
        # the Play upload below fails (e.g. the one-time full-screen-intent
        # 403 — the declaration form in Play Console only appears once a
        # bundle carrying USE_FULL_SCREEN_INTENT has been uploaded, so the
        # break-the-deadlock move is to download this AAB and upload it once
        # via the Console UI, complete the declaration, then let CI take over).
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-${{ github.ref_name }}
          path: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Authenticate to Google Cloud via Workload Identity Federation
        # Exchanges the GitHub OIDC token for a short-lived GCP access
        # token that impersonates the fastlane-play-publisher SA. The
        # access token is exposed as the step's `access_token` output
        # AND written to a credentials file at $GOOGLE_APPLICATION_CREDENTIALS.
        # Our upload script uses the access_token output directly.
        id: gcp-auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/480139204146/locations/global/workloadIdentityPools/github-actions-pool/providers/github
          service_account: fastlane-play-publisher@speakeasy-mobile-497702.iam.gserviceaccount.com
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Upload to Internal App Sharing (review-free install link)
        # The "update behind the review" path: a Play-hosted install link
        # that bypasses the track review, so testers get the latest build
        # via Play (no sideload) even while an App-content / full-screen-
        # intent declaration review holds the normal track release. Best-
        # effort — never fails the build (see the script). The link is
        # printed to the run summary. The automatic @speaker broadcast is
        # MUTED: ADMIN_TOKEN is intentionally NOT passed, so the script's
        # `if [ -n "$ADMIN_TOKEN" ]` broadcast block is skipped. Announce
        # deliberately via `gh workflow run announce.yml` instead.
        env:
          ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          PACKAGE_NAME: xyz.speakeasyapp.app
          AAB_PATH: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          RELEASE_NAME: ${{ github.ref_name }}
        run: bash scripts/play-internal-share.sh

      - name: Upload AAB to Play Console Internal Testing track
        env:
          ACCESS_TOKEN: ${{ steps.gcp-auth.outputs.access_token }}
          PACKAGE_NAME: xyz.speakeasyapp.app
          AAB_PATH: apps/mobile/android/app/build/outputs/bundle/release/app-release.aab
          TRACK: internal
          # Play Console release name is what shows up in the dashboard's
          # "Release name" column — use the full tag so it's bisectable
          # against the GitHub release.
          RELEASE_NAME: ${{ github.ref_name }}
          # 'completed' auto-rolls the AAB out to the Internal Testing
          # tester list on upload — no Play Console click required.
          # Safe for Internal: that track is the founder's hand-picked
          # tester list, doesn't undergo Google review, and is the
          # whole point of the pipeline (every RC should reach testers
          # without manual ceremony). Open / Production promotions
          # still go through `play-promote.yml` with their own status
          # choice and Google review gating.
          #
          # Was 'draft' through rc.34. Flipped after a tester reported
          # the Play Store wasn't surfacing the upgrade — every RC was
          # silently waiting on a "Send to testers" click that wasn't
          # always remembered.
          #
          # FULL-SCREEN INTENT: a 'completed' commit of a bundle carrying
          # USE_FULL_SCREEN_INTENT is rejected (403 "you must let us know…")
          # until the full-screen-intent declaration is filed in Play Console
          # (Monitor and improve → App content). Declaration submitted for
          # Google review at rc.72 — testing here whether SUBMISSION clears
          # the upload gate (vs needing full APPROVAL). If this 'completed'
          # commit 403s, revert to 'draft' (which commits regardless) until
          # the review is approved.
          RELEASE_STATUS: completed
        run: bash scripts/play-publish.sh
