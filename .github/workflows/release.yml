name: Release APK

# Triggered when a tag matching `alpha-*` is pushed (e.g. `alpha-0.2.0`).
# Builds the release APK with the real Vouchflow API key (via repo
# secret) and uploads it as an asset on the matching GitHub release.
#
# Tier B no longer gates releases. The gate was effectively never
# green (zero successes across its lifetime) and the `SKIP_TIERB_GATE`
# bypass became the default path — worst of both worlds. The Tier B
# suite is manual-only now (see tier-b-emulator.yml — workflow_dispatch
# from the Actions tab). When it returns to reliable green, restoring
# the gate is a small change.
#
# Setup required (one-time):
#   gh secret set VOUCHFLOW_WRITE_KEY --body "$VOUCHFLOW_WRITE_KEY"
#
# Usage:
#   gh release create alpha-0.2.0 --prerelease --title "..." --notes "..."
#   git push --tags
# CI takes it from there — APK lands on the release a few minutes later.

on:
  push:
    tags: ['alpha-*']

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-release-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # The gradle prebuild hook handles this too, but doing it once
        # at the workspace level catches any package-build error before
        # we sink ~5 min into the gradle leg.
        run: npm run build

      - name: Typecheck + test
        run: |
          npm run typecheck
          npm run test

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          VOUCHFLOW_WRITE_KEY: ${{ secrets.VOUCHFLOW_WRITE_KEY }}
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          # Gradle reads ORG_GRADLE_PROJECT_* env vars as project
          # properties — keeps the keystore credentials off the command
          # line (and out of the process list) entirely.
          ORG_GRADLE_PROJECT_RELEASE_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORG_GRADLE_PROJECT_RELEASE_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$VOUCHFLOW_WRITE_KEY" ]; then
            echo "::error::VOUCHFLOW_WRITE_KEY secret is not set."
            echo "::error::Configure it: gh secret set VOUCHFLOW_WRITE_KEY"
            exit 1
          fi
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — cannot sign the release."
            echo "::error::See PRODUCTION_READINESS_AUDIT.md P0 #4 for keystore setup."
            exit 1
          fi
          # Decode the production keystore from the repo secret into the
          # runner temp dir — never the workspace, never committed.
          keystore="$RUNNER_TEMP/speakeasy-release.keystore"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$keystore"
          # -Pvouchflow.environment=production: a release artifact must
          # talk to production Vouchflow, not the sandbox default.
          ./gradlew :app:assembleRelease --no-daemon \
            -Pvouchflow.apiKey="$VOUCHFLOW_WRITE_KEY" \
            -Pvouchflow.environment=production \
            -PRELEASE_STORE_FILE="$keystore"

      - name: Assert the release APK is not debug-signed
        # Defence in depth behind the build.gradle keystore wiring: if the
        # production keystore ever fails to apply, the build falls back to
        # debug signing — this step catches that before anything publishes.
        run: |
          apk="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          apksigner="$ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner"
          if [ ! -x "$apksigner" ]; then
            apksigner=$(find "$ANDROID_SDK_ROOT/build-tools" -name apksigner -type f | head -1)
          fi
          certs=$("$apksigner" verify --print-certs "$apk")
          echo "$certs"
          if echo "$certs" | grep -q "CN=Android Debug"; then
            echo "::error::Release APK is signed with the Android debug certificate — the production keystore was not applied. Refusing to publish."
            exit 1
          fi
          echo "Release APK is signed with a non-debug certificate."

      - name: Assert built APK carries the tag version
        # rc.82+: gradle derives versionName/versionCode from the git
        # tag at build time (see app/build.gradle deriveVersionString).
        # This step tests the built artifact rather than the sources —
        # if anything in the version-derivation chain breaks (env
        # variable not visible to gradle, regex bug, fallback fires
        # accidentally), the APK manifest will disagree with the tag
        # and we fail before publishing.
        run: |
          tag="${GITHUB_REF##*/}"
          expected_name="${tag#alpha-}"
          expected_code="${tag##*-rc.}"
          apk="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"

          # build-tools 35.0.0 is provisioned by android-actions/setup-android above
          aapt="$ANDROID_SDK_ROOT/build-tools/35.0.0/aapt"
          if [ ! -x "$aapt" ]; then
            # Fallback for build-tools layout changes
            aapt=$(find "$ANDROID_SDK_ROOT/build-tools" -name aapt -type f -executable | head -1)
          fi

          badging=$("$aapt" dump badging "$apk")
          actual_name=$(echo "$badging" | grep -oP "versionName='\K[^']+")
          actual_code=$(echo "$badging" | grep -oP "versionCode='\K[^']+")

          echo "Expected versionName: $expected_name"
          echo "Expected versionCode: $expected_code"
          echo "Actual versionName:   $actual_name"
          echo "Actual versionCode:   $actual_code"

          fail=0
          if [ "$actual_name" != "$expected_name" ]; then
            echo "::error::APK versionName ($actual_name) does not match tag ($expected_name)"
            fail=1
          fi
          if [ "$actual_code" != "$expected_code" ]; then
            echo "::error::APK versionCode ($actual_code) does not match tag-derived code ($expected_code)"
            fail=1
          fi
          exit $fail

      - name: Rename APK with version tag
        id: rename
        run: |
          tag="${GITHUB_REF##*/}"
          src="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          out="speakeasy-${tag}.apk"
          cp "$src" "$out"
          echo "apk=$out" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##*/}"
          # If the release already exists (created manually with `gh release
          # create` so the tag exists), upload to it. Otherwise create one.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${{ steps.rename.outputs.apk }}" --clobber
          else
            # No --prerelease: every release we cut has been meant as
            # Latest. Pre-creating the release with `gh release create`
            # before tag-push remains the recommended flow (lets you
            # set notes / draft state explicitly), but the workflow
            # fallback now produces a usable Latest release instead of
            # a prerelease that requires manual promotion every time.
            gh release create "$tag" "${{ steps.rename.outputs.apk }}" \
              --title "$tag" \
              --notes "APK built by .github/workflows/release.yml. See commits since previous tag."
          fi

      - name: Announce the build via @speaker
        # Fans a "new build available" message out from the @speaker
        # bot to every user (POST /v1/broadcast). Best-effort: if the
        # ADMIN_TOKEN secret isn't set the step is skipped, and a
        # broadcast failure is a warning, not a build failure.
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "ADMIN_TOKEN secret not set — skipping @speaker broadcast."
            exit 0
          fi
          tag="${GITHUB_REF##*/}"
          url="https://github.com/${GITHUB_REPOSITORY}/releases/tag/${tag}"
          curl -fsS -X POST "https://api.speakeasyapp.xyz/v1/broadcast" \
            -H "Authorization: Bearer $ADMIN_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"New build ${tag} is available — ${url}\"}" \
            || echo "::warning::@speaker broadcast failed (non-fatal)."
