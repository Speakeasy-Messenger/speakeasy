name: Release APK

# Triggered when a tag matching `alpha-*` is pushed (e.g. `alpha-0.2.0`).
# Builds the release APK with the real Vouchflow API key (via repo
# secret) and uploads it as an asset on the matching GitHub release.
#
# Setup required (one-time):
#   gh secret set VOUCHFLOW_WRITE_KEY --body "$VOUCHFLOW_WRITE_KEY"
#
# Usage:
#   gh release create alpha-0.2.0 --prerelease --title "..." --notes "..."
#   git push --tags
# CI takes it from there — APK lands on the release within ~5 min.

on:
  push:
    tags: ['alpha-*']

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-release-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        # The gradle prebuild hook handles this too, but doing it once
        # at the workspace level catches any package-build error before
        # we sink ~5 min into the gradle leg.
        run: npm run build

      - name: Typecheck + test
        run: |
          npm run typecheck
          npm run test

      - name: Assert versionName matches git tag
        # Stops the rc.58-stuck-for-22-releases problem from recurring.
        # The gradle versionName, the JS APP_VERSION constant, and the
        # git tag being built must all agree, or the APK lies about
        # what it is and user bug reports become useless.
        #
        # Tag format: alpha-0.5.0-rc.NN → expected versionName "0.5.0-rc.NN"
        # and expected versionCode NN.
        run: |
          tag="${GITHUB_REF##*/}"
          expected_name="${tag#alpha-}"
          expected_code="${tag##*-rc.}"

          gradle_name=$(grep -oP 'versionName "\K[^"]+' apps/mobile/android/app/build.gradle | head -1)
          gradle_code=$(grep -oP 'versionCode \K[0-9]+'  apps/mobile/android/app/build.gradle | head -1)
          js_version=$(grep -oP "APP_VERSION = '\K[^']+" apps/mobile/src/screens/AboutScreen.tsx)
          js_build=$(grep -oP "APP_BUILD = '\K[^']+"     apps/mobile/src/screens/AboutScreen.tsx)

          echo "Expected versionName: $expected_name"
          echo "Expected versionCode: $expected_code"
          echo "Gradle versionName:   $gradle_name"
          echo "Gradle versionCode:   $gradle_code"
          echo "JS APP_VERSION:       $js_version"
          echo "JS APP_BUILD:         $js_build"

          fail=0
          if [ "$gradle_name" != "$expected_name" ]; then
            echo "::error::gradle versionName ($gradle_name) does not match tag ($expected_name)"
            fail=1
          fi
          if [ "$gradle_code" != "$expected_code" ]; then
            echo "::error::gradle versionCode ($gradle_code) does not match tag-derived code ($expected_code)"
            fail=1
          fi
          if [ "$js_version" != "$expected_name" ]; then
            echo "::error::AboutScreen.tsx APP_VERSION ($js_version) does not match tag ($expected_name)"
            fail=1
          fi
          if [ "$js_build" != "$expected_code" ]; then
            echo "::error::AboutScreen.tsx APP_BUILD ($js_build) does not match tag-derived code ($expected_code)"
            fail=1
          fi
          exit $fail

      - name: Build release APK
        working-directory: apps/mobile/android
        env:
          VOUCHFLOW_WRITE_KEY: ${{ secrets.VOUCHFLOW_WRITE_KEY }}
        run: |
          if [ -z "$VOUCHFLOW_WRITE_KEY" ]; then
            echo "::error::VOUCHFLOW_WRITE_KEY secret is not set."
            echo "::error::Configure it: gh secret set VOUCHFLOW_WRITE_KEY"
            exit 1
          fi
          ./gradlew :app:assembleRelease --no-daemon \
            -Pvouchflow.apiKey="$VOUCHFLOW_WRITE_KEY"

      - name: Rename APK with version tag
        id: rename
        run: |
          tag="${GITHUB_REF##*/}"
          src="apps/mobile/android/app/build/outputs/apk/release/app-release.apk"
          out="speakeasy-${tag}.apk"
          cp "$src" "$out"
          echo "apk=$out" >> "$GITHUB_OUTPUT"

      - name: Upload APK to GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF##*/}"
          # If the release already exists (created manually with `gh release
          # create` so the tag exists), upload to it. Otherwise create one.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${{ steps.rename.outputs.apk }}" --clobber
          else
            gh release create "$tag" "${{ steps.rename.outputs.apk }}" \
              --prerelease \
              --title "$tag" \
              --notes "APK built by .github/workflows/release.yml. See commits since previous tag."
          fi
