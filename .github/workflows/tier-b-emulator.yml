name: Tier B — Android emulator E2E

# Per the user's framing:
#   - Tier A (Node-side integration tests, fast) gates every push
#   - Tier B (this) gates main + release tags
#
# We boot an Android emulator inside the runner, point the JS app at a
# Fastify server running on the same runner via the emulator's host
# loopback (10.0.2.2), and step through the Maestro flows in
# apps/mobile/maestro/. Failure here blocks the release-tag build.

on:
  push:
    branches: [main]
    tags: ['alpha-*']
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  emulator-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # KVM is required for hardware-accelerated emulator. Ubuntu runners
    # support it but only after we enable it via the kvm-group fix.
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: 'platform-tools platforms;android-35 build-tools;35.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            apps/mobile/android/.gradle
          key: gradle-tier-b-${{ runner.os }}-${{ hashFiles('apps/mobile/android/**/*.gradle*', 'apps/mobile/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-tier-b-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build workspace packages
        run: npm run build

      - name: Install Maestro
        # Maestro CLI installer lands at ~/.maestro/bin/maestro and adds
        # itself to PATH for subsequent steps via $GITHUB_PATH.
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Verify Maestro
        run: maestro --version

      - name: Rewrite mobile config to point at the in-runner api server
        env:
          # `10.0.2.2` is the emulator's loopback to the host. The api
          # server we boot below listens on 0.0.0.0:8080.
          API_BASE_URL: http://10.0.2.2:8080
          WS_URL: ws://10.0.2.2:8080/ws
          USE_CI_VOUCHFLOW: "1"
        run: node apps/mobile/scripts/write-test-config.mjs

      - name: Build release APK (with mock Vouchflow + signal)
        working-directory: apps/mobile/android
        env:
          # Real Vouchflow can't run in the emulator (no Play Integrity).
          # The build-time guard in app/build.gradle still requires a
          # non-placeholder key, so feed it the secret. The mock
          # validator on the server side accepts any token.
          VOUCHFLOW_WRITE_KEY: ${{ secrets.VOUCHFLOW_WRITE_KEY }}
        run: |
          if [ -z "$VOUCHFLOW_WRITE_KEY" ]; then
            echo "::error::VOUCHFLOW_WRITE_KEY secret is not set"
            exit 1
          fi
          ./gradlew :app:assembleRelease --no-daemon \
            -Pvouchflow.apiKey="$VOUCHFLOW_WRITE_KEY"

      - name: Boot api server (real Vouchflow sandbox, in-memory repos)
        env:
          PORT: '8080'
          HOST: '0.0.0.0'
          LOG_LEVEL: 'info'
          VOUCHFLOW_READ_KEY: ${{ secrets.VOUCHFLOW_READ_KEY }}
          VOUCHFLOW_BASE_URL: 'https://sandbox.api.vouchflow.dev/v1'
          VOUCHFLOW_MIN_CONFIDENCE: 'low'
        run: |
          cd apps/api
          nohup node dist/server.js > /tmp/api-server.log 2>&1 &
          # Wait for healthz; fail fast if it never comes up.
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/healthz > /dev/null; then
              echo "api server is up"
              exit 0
            fi
            sleep 1
          done
          echo "api server did not come up; log:"
          cat /tmp/api-server.log
          exit 1

      - name: Run Maestro flows on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: pixel_5
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # The action passes `script` to `sh -c` line by line — backslash
          # continuations don't survive. Single line with `&&` chaining
          # works; so does `set -e` + bare lines via the `bash` runner.
          # We use the single-line form for clarity.
          script: adb install -r apps/mobile/android/app/build/outputs/apk/release/app-release.apk && maestro test apps/mobile/maestro/01-enroll.yaml --debug-output /tmp/maestro-01 && maestro test apps/mobile/maestro/02-self-dm.yaml --debug-output /tmp/maestro-02 && maestro test apps/mobile/maestro/03-background-foreground.yaml --debug-output /tmp/maestro-03 && maestro test apps/mobile/maestro/04-peer-not-found.yaml --debug-output /tmp/maestro-04

      - name: Dump diagnostics on failure
        if: failure()
        # Hard-timeout each step so a hung adb / offline emulator can't
        # hang the whole job. The reactivecircus action sometimes leaves
        # the emulator process alive but the adb daemon disconnected,
        # which makes `adb shell` block indefinitely.
        timeout-minutes: 3
        run: |
          set +e
          echo "::group::api server log"
          cat /tmp/api-server.log || true
          echo "::endgroup::"
          echo "::group::maestro debug tree"
          for d in /tmp/maestro-*; do
            echo "=== $d ==="
            find "$d" -maxdepth 5 -type f 2>/dev/null | head -30
          done
          echo "::endgroup::"
          echo "::group::maestro.log (full Maestro output)"
          for f in /tmp/maestro-*/.maestro/tests/*/maestro.log; do
            echo "=== $f ==="
            cat "$f" 2>/dev/null | tail -200 || true
          done
          echo "::endgroup::"
          # Stage screenshots into a flat dir for upload-artifact (its
          # glob support is limited; a single dir at a known path works).
          mkdir -p /tmp/maestro-staging
          for f in /tmp/maestro-*/.maestro/tests/*/*.png; do
            cp -v "$f" /tmp/maestro-staging/ 2>/dev/null || true
          done
          for f in /tmp/maestro-*/.maestro/tests/*/maestro.log; do
            # Prefix with the parent dir name so logs from different
            # flows don't collide.
            base="$(basename "$(dirname "$f")")"
            cp -v "$f" "/tmp/maestro-staging/$base-maestro.log" 2>/dev/null || true
          done
          ls -la /tmp/maestro-staging/ 2>/dev/null || true
          echo "::group::on-device crash files"
          timeout 15 adb shell "ls /sdcard/Download/speakeasy_crash_*.txt 2>/dev/null" || true
          timeout 30 adb shell "for f in /sdcard/Download/speakeasy_crash_*.txt; do echo \"=== \$f\"; cat \$f; done" || true
          echo "::endgroup::"
          echo "::group::adb logcat (last 300 lines)"
          timeout 15 adb logcat -d -t 300 2>/dev/null || true
          echo "::endgroup::"

      - name: Upload Maestro debug artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-${{ github.sha }}
          # /tmp/maestro-staging is populated by the Dump diagnostics
          # step (which `cp`s all PNGs + maestro.log into a flat dir).
          # The single-dir form survives upload-artifact's glob quirks.
          path: /tmp/maestro-staging/
          retention-days: 7
          if-no-files-found: warn
